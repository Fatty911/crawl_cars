version: '3.8'

services:
  # 定时任务服务
  crawl-cron:
    build: .
    container_name: crawl-cron
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - RUN_TIME=7200
      - MAX_CARS=500
      - PYTHONUNBUFFERED=1
      - PROXY_ENABLED=false
    volumes:
      - ./data:/app/data
      - ./html:/app/html
      - ./newhtml:/app/newhtml
      - ./json:/app/json
      - ./content:/app/content
      - ./newjson:/app/newjson
      - ./exception:/app/exception
      - ./dongchedi:/app/dongchedi
      - ./proxies.json:/app/proxies.json
      - ./output:/app/output
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    entrypoint: ["/bin/bash", "/app/start_with_clash.sh"]
    command: bash /app/docker-cron.sh

  # 手动运行服务
  crawl-manual:
    build: .
    container_name: crawl-manual
    environment:
      - TZ=Asia/Shanghai
      - RUN_TIME=7200
      - MAX_CARS=500
      - PROXY_ENABLED=false
    volumes:
      - ./data:/app/data
      - ./html:/app/html
      - ./newhtml:/app/newhtml
      - ./json:/app/json
      - ./content:/app/content
      - ./newjson:/app/newjson
      - ./exception:/app/exception
      - ./dongchedi:/app/dongchedi
      - ./proxies.json:/app/proxies.json
      - ./output:/app/output
    profiles:
      - manual
    entrypoint: ["/bin/bash", "/app/start_with_clash.sh"]
    command: tail -f /dev/null
