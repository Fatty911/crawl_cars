name: AI Auto Fix Monitor

on:
  workflow_run:
    workflows: ["汽车之家爬虫", "懂车帝爬虫"]
    types: [completed]

concurrency:
  group: ai-auto-fix-${{ github.event.workflow_run.name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  ai_fix:
    name: "AI Fix → ${{ github.event.workflow_run.name }}"
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Download error log artifact
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          name: error-log
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run AI Auto Fix
        id: ai_fix
        env:
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ATOMGIT_BASE_URL: ${{ secrets.ATOMGIT_BASE_URL }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          ATOMGIT_PROXY_URL: ${{ secrets.ATOMGIT_PROXY_URL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_CODING_PLAN_API_KEY: ${{ secrets.MINIMAX_CODING_PLAN_API_KEY }}
          MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
          MINIMAX_PROXY_URL: ${{ secrets.MINIMAX_PROXY_URL }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          MODAL_BASE_URL: ${{ secrets.MODAL_BASE_URL }}
          MODAL_MODEL_LIST: ${{ secrets.MODAL_MODEL_LIST }}
          MODAL_PROXY_URL: ${{ secrets.MODAL_PROXY_URL }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          MODELSCOPE_BASE_URL: ${{ secrets.MODELSCOPE_BASE_URL }}
          MODELSCOPE_MODEL_LIST: ${{ secrets.MODELSCOPE_MODEL_LIST }}
          MODELSCOPE_PROXY_URL: ${{ secrets.MODELSCOPE_PROXY_URL }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MOONSHOT_BASE_URL: ${{ secrets.MOONSHOT_BASE_URL }}
          MOONSHOT_MODEL_LIST: ${{ secrets.MOONSHOT_MODEL_LIST }}
          MOONSHOT_PROXY_URL: ${{ secrets.MOONSHOT_PROXY_URL }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_NIM_BASE_URL: ${{ secrets.NVIDIA_NIM_BASE_URL }}
          NVIDIA_NIM_MODEL_LIST: ${{ secrets.NVIDIA_NIM_MODEL_LIST }}
          NVIDIA_NIM_PROXY_URL: ${{ secrets.NVIDIA_NIM_PROXY_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL_LIST: ${{ secrets.OPENROUTER_MODEL_LIST }}
          OPENROUTER_PROXY_URL: ${{ secrets.OPENROUTER_PROXY_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: ${{ secrets.XAI_BASE_URL }}
          XAI_MODEL_LIST: ${{ secrets.XAI_MODEL_LIST }}
          XAI_PROXY_URL: ${{ secrets.XAI_PROXY_URL }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          ZEN_BASE_URL: ${{ secrets.ZEN_BASE_URL }}
          ZEN_MODEL_LIST: ${{ secrets.ZEN_MODEL_LIST }}
          ZEN_PROXY_URL: ${{ secrets.ZEN_PROXY_URL }}
          ACTION_PAT: ${{ secrets.ACTION_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 工作流 [${{ github.event.workflow_run.name }}] 运行失败 ==="
          echo "Run ID: ${{ github.event.workflow_run.id }}"

          gh run view ${{ github.event.workflow_run.id }} --log-failed > /tmp/workflow_error.log 2>/dev/null || echo "gh CLI 日志获取失败"

          LOGS=()
          PRIMARY_LOG=""
          if [ -s "/tmp/workflow_error.log" ]; then
            LOGS+=("/tmp/workflow_error.log")
            PRIMARY_LOG="/tmp/workflow_error.log"
          fi

          for candidate in step1_error.log step2_error.log remaining_error.log last_error.log; do
            if [ -f "$candidate" ]; then
              echo "找到错误日志: $candidate"
              LOGS+=("$candidate")
              if [ -z "$PRIMARY_LOG" ]; then
                PRIMARY_LOG="$candidate"
              fi
            fi
          done

          if [ "${#LOGS[@]}" -eq 0 ]; then
            echo "无法获取错误日志，跳过 AI 修复"
            echo "fixed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          python custom_scripts/classify_crawl_failure.py "${LOGS[@]}" --github-output "$GITHUB_OUTPUT"
          if grep -q '^should_fix=false$' "$GITHUB_OUTPUT"; then
            echo "日志判定为主动分段退出、数据质量保护、临时基础设施异常或 AI Provider 自身异常，跳过 AI 修复"
            echo "fixed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          set +e
          python auto_fix_workflow.py "$PRIMARY_LOG"
          FIX_EXIT=$?
          set -e

          if [ "$FIX_EXIT" -eq 0 ]; then
            echo "fixed=true" >> $GITHUB_OUTPUT
          else
            echo "AI 修复器没有产出可用改动，记录为跳过而不是让监控工作流失败"
            echo "fixed=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip automatic rerun
        if: success() && steps.ai_fix.outputs.fixed == 'true'
        run: |
          echo "AI 修复已提交。为避免循环，不自动 rerun 原始失败工作流。"
          echo "原始 run 使用旧 commit，直接 rerun 可能再次失败并触发监控循环。"

      - name: Report skipped AI fix
        if: success() && steps.ai_fix.outputs.fixed != 'true'
        run: |
          echo "本次失败无需或未能完成自动代码修复，监控工作流已正常结束。"
