name: AI Auto Fix Monitor

on:
  workflow_run:
    workflows: ["汽车之家爬虫", "懂车帝爬虫"]
    types: [completed]

concurrency:
  group: ai-auto-fix-${{ github.event.workflow_run.name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  ai_fix:
    name: "AI Fix → ${{ github.event.workflow_run.name }}"
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Download error log artifact
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          name: error-log
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run AI Auto Fix
        id: ai_fix
        env:
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_CODING_PLAN_API_KEY: ${{ secrets.MINIMAX_CODING_PLAN_API_KEY }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          ACTION_PAT: ${{ secrets.ACTION_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "=== 工作流 [${{ github.event.workflow_run.name }}] 运行失败 ==="
          echo "Run ID: ${{ github.event.workflow_run.id }}"

          # 查找错误日志
          ERROR_LOG=""
          if [ -f "step1_error.log" ]; then
            ERROR_LOG="step1_error.log"
          elif [ -f "step2_error.log" ]; then
            ERROR_LOG="step2_error.log"
          elif [ -f "remaining_error.log" ]; then
            ERROR_LOG="remaining_error.log"
          elif [ -f "last_error.log" ]; then
            ERROR_LOG="last_error.log"
          fi

          if [ -n "$ERROR_LOG" ]; then
            echo "找到错误日志: $ERROR_LOG"
            python custom_scripts/classify_crawl_failure.py "$ERROR_LOG" --github-output "$GITHUB_OUTPUT"
            if grep -q '^should_fix=false$' "$GITHUB_OUTPUT"; then
              echo "日志判定为主动分段退出或进度保护退出，跳过 AI 修复"
              echo "fixed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            python auto_fix_workflow.py "$ERROR_LOG"
            echo "fixed=true" >> $GITHUB_OUTPUT
          else
            echo "未找到错误日志文件，尝试从 gh CLI 获取..."
            gh run view ${{ github.event.workflow_run.id }} --log-failed > /tmp/workflow_error.log 2>/dev/null || echo "gh CLI 日志获取失败"
            if [ -f "/tmp/workflow_error.log" ] && [ -s "/tmp/workflow_error.log" ]; then
              python custom_scripts/classify_crawl_failure.py /tmp/workflow_error.log --github-output "$GITHUB_OUTPUT"
              if grep -q '^should_fix=false$' "$GITHUB_OUTPUT"; then
                echo "日志判定为主动分段退出或进度保护退出，跳过 AI 修复"
                echo "fixed=false" >> $GITHUB_OUTPUT
                exit 0
              fi
              python auto_fix_workflow.py /tmp/workflow_error.log
              echo "fixed=true" >> $GITHUB_OUTPUT
            else
              echo "无法获取错误日志，跳过 AI 修复"
              exit 1
            fi
          fi

      - name: Skip automatic rerun
        if: success() && steps.ai_fix.outputs.fixed == 'true'
        run: |
          echo "AI 修复已提交。为避免循环，不自动 rerun 原始失败工作流。"
          echo "原始 run 使用旧 commit，直接 rerun 可能再次失败并触发监控循环。"

      - name: Report skipped AI fix
        if: success() && steps.ai_fix.outputs.fixed != 'true'
        run: |
          echo "本次失败被判定为爬虫主动分段退出/进度保护退出，未调用大模型修复。"
