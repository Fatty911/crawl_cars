name: AI Auto Fix Monitor

on:
  workflow_run:
    workflows: ["汽车之家爬虫", "懂车帝爬虫"]
    types: [completed]

concurrency:
  group: ai-auto-fix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  ai_fix:
    name: "Codex Fix → ${{ github.event.workflow_run.name }}"
    if: >-
      ${{
        github.event.workflow_run.head_branch == 'main' &&
        (github.event.workflow_run.conclusion == 'failure' ||
         github.event.workflow_run.conclusion == 'success')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          token: ${{ secrets.ACTION_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Download error log artifact if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh run download ${{ github.event.workflow_run.id }} --name error-log --dir . 2>/tmp/error_log_download.txt; then
            echo "已下载 error-log artifact"
          else
            echo "未找到 error-log artifact，继续使用 gh run view 获取完整日志"
            cat /tmp/error_log_download.txt
          fi

      - name: Inspect completed workflow
        id: inspect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_CREATED_AT: ${{ github.event.workflow_run.created_at }}
          WORKFLOW_STARTED_AT: ${{ github.event.workflow_run.run_started_at }}
        run: |
          echo "=== 工作流 [${WORKFLOW_NAME}] 已完成 ==="
          echo "Run ID: ${{ github.event.workflow_run.id }}"
          echo "Conclusion: ${WORKFLOW_CONCLUSION}"
          echo "Event: ${WORKFLOW_EVENT}"

          gh run view ${{ github.event.workflow_run.id }} --log > workflow_full.log 2>/tmp/gh_full_log_error.txt || true
          gh run view ${{ github.event.workflow_run.id }} --log-failed > workflow_error.log 2>/tmp/gh_failed_log_error.txt || true

          LOGS=()
          for candidate in workflow_full.log workflow_error.log step1_error.log step2_error.log remaining_error.log last_error.log; do
            if [ -s "$candidate" ]; then
              echo "找到日志: $candidate"
              LOGS+=("$candidate")
            fi
          done

          if [ "${#LOGS[@]}" -eq 0 ]; then
            echo "无法获取 workflow 日志，跳过自动修复"
            echo "classification=no_logs" >> "$GITHUB_OUTPUT"
            echo "reason=无法通过 gh 或 artifact 获取日志" >> "$GITHUB_OUTPUT"
            echo "should_fix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python scripts/check_workflow_expectations.py "${LOGS[@]}" --github-output "$GITHUB_OUTPUT"

          {
            echo "# Codex Auto Fix Context"
            echo
            echo "- Repository: ${{ github.repository }}"
            echo "- Workflow: ${WORKFLOW_NAME}"
            echo "- Run ID: ${{ github.event.workflow_run.id }}"
            echo "- Conclusion: ${WORKFLOW_CONCLUSION}"
            echo "- Event: ${WORKFLOW_EVENT}"
            echo "- Head SHA: ${{ github.event.workflow_run.head_sha }}"
            echo
            echo "## Task"
            echo "你正在 GitHub Actions 中作为 Codex 自修复代理运行。"
            echo "请只在确认是仓库源码、工作流、校验脚本或文档问题时修改代码。"
            echo "如果日志显示是临时网络、代理订阅不可用、站点短暂限流、GitHub runner 抖动、或者半月完成后的正常跳过，请不要修改文件。"
            echo
            echo "## Repository Rules"
            echo "- 直接在 main 上修复；禁止 force push。"
            echo "- 不要启动长时间爬虫；只运行语法校验、workflow 静态校验或很短的 smoke test。"
            echo "- 修改代码或 workflow 后必须同步 README.md、CHANGELOG.md、HISTORY.md；代理相关还要同步 DOCKER_DEPLOY.md。"
            echo "- 允许修改的范围：.github/workflows/、scripts/、爬虫脚本、scripts/auto_fix_workflow.py、README/CHANGELOG/HISTORY/AGENTS/部署文档。"
            echo "- 修复目标是让爬虫 workflow 符合：上午 08:00-12:30，下午 13:00-22:00；长跑自动按 Action 6 小时硬限制和当前时间窗口取更早截止，并保留提交缓冲；每半月完成后跳过。"
            echo
            echo "## Logs"
            echo '```text'
            head -c 200000 "${LOGS[0]}"
            echo
            echo '```'
          } > config/codex_auto_fix_context.md

      - name: Check Codex secret
        id: codex_key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "未配置 OPENAI_API_KEY，将使用旧版多 Provider 修复器兜底"
          fi

      - name: Run Codex self-healing
        id: run_codex
        if: steps.inspect.outputs.should_fix == 'true' && steps.codex_key.outputs.available == 'true'
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: config/codex_auto_fix_context.md
          output-file: codex_final_message.md
          sandbox: workspace-write
          codex-args: '["--full-auto"]'

      - name: Validate Codex changes
        if: steps.inspect.outputs.should_fix == 'true' && steps.run_codex.outcome == 'success'
        run: |
          rm -f config/codex_auto_fix_context.md codex_final_message.md
          if [ -z "$(git status --porcelain)" ]; then
            echo "Codex 没有产生文件改动，视为无需提交"
            exit 0
          fi
          python scripts/ensure_codex_autofix_scope.py
          python scripts/validate_syntax.py
          python scripts/validate_workflow_expectations.py

      - name: Commit and push Codex fix
        id: codex_push
        if: steps.inspect.outputs.should_fix == 'true' && steps.run_codex.outcome == 'success'
        env:
          ACTION_PAT: ${{ secrets.ACTION_PAT }}
          GH_TOKEN: ${{ secrets.ACTION_PAT || secrets.GITHUB_TOKEN }}
        run: |
          rm -f config/codex_auto_fix_context.md codex_final_message.md
          if [ -z "$(git status --porcelain)" ]; then
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config --local user.email "109130780+Fatty911@users.noreply.github.com"
          git config --local user.name "Hermes-Agent"
          git add -A
          git diff --staged --quiet && {
            echo "fixed=false" >> "$GITHUB_OUTPUT"
            exit 0
          }
          git commit -m "Codex auto-fix crawler workflow"

          if [ -n "${ACTION_PAT:-}" ]; then
            REMOTE_URL="https://x-access-token:${ACTION_PAT}@github.com/${{ github.repository }}.git"
          else
            REMOTE_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi
          git pull --rebase --autostash "$REMOTE_URL" main
          git push "$REMOTE_URL" HEAD:main
          echo "fixed=true" >> "$GITHUB_OUTPUT"

      - name: Run legacy AI auto-fix fallback
        id: legacy_ai_fix
        if: >-
          ${{
            steps.inspect.outputs.should_fix == 'true' &&
            (steps.codex_key.outputs.available != 'true' || steps.run_codex.outcome == 'failure')
          }}
        env:
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ATOMGIT_BASE_URL: ${{ secrets.ATOMGIT_BASE_URL }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          ATOMGIT_PROXY_URL: ${{ secrets.ATOMGIT_PROXY_URL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_BASE_URL: ${{ secrets.MINIMAX_BASE_URL }}
          MINIMAX_CODING_PLAN_API_KEY: ${{ secrets.MINIMAX_CODING_PLAN_API_KEY }}
          MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
          MINIMAX_PROXY_URL: ${{ secrets.MINIMAX_PROXY_URL }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          MODAL_BASE_URL: ${{ secrets.MODAL_BASE_URL }}
          MODAL_MODEL_LIST: ${{ secrets.MODAL_MODEL_LIST }}
          MODAL_PROXY_URL: ${{ secrets.MODAL_PROXY_URL }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          MODELSCOPE_BASE_URL: ${{ secrets.MODELSCOPE_BASE_URL }}
          MODELSCOPE_MODEL_LIST: ${{ secrets.MODELSCOPE_MODEL_LIST }}
          MODELSCOPE_PROXY_URL: ${{ secrets.MODELSCOPE_PROXY_URL }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          MOONSHOT_BASE_URL: ${{ secrets.MOONSHOT_BASE_URL }}
          MOONSHOT_MODEL_LIST: ${{ secrets.MOONSHOT_MODEL_LIST }}
          MOONSHOT_PROXY_URL: ${{ secrets.MOONSHOT_PROXY_URL }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_NIM_BASE_URL: ${{ secrets.NVIDIA_NIM_BASE_URL }}
          NVIDIA_NIM_MODEL_LIST: ${{ secrets.NVIDIA_NIM_MODEL_LIST }}
          NVIDIA_NIM_PROXY_URL: ${{ secrets.NVIDIA_NIM_PROXY_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          OPENROUTER_MODEL_LIST: ${{ secrets.OPENROUTER_MODEL_LIST }}
          OPENROUTER_PROXY_URL: ${{ secrets.OPENROUTER_PROXY_URL }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: ${{ secrets.XAI_BASE_URL }}
          XAI_MODEL_LIST: ${{ secrets.XAI_MODEL_LIST }}
          XAI_PROXY_URL: ${{ secrets.XAI_PROXY_URL }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          ZEN_BASE_URL: ${{ secrets.ZEN_BASE_URL }}
          ZEN_MODEL_LIST: ${{ secrets.ZEN_MODEL_LIST }}
          ZEN_PROXY_URL: ${{ secrets.ZEN_PROXY_URL }}
          ACTION_PAT: ${{ secrets.ACTION_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRIMARY_LOG="workflow_error.log"
          if [ ! -s "$PRIMARY_LOG" ]; then
            PRIMARY_LOG="workflow_full.log"
          fi
          set +e
          python scripts/auto_fix_workflow.py "$PRIMARY_LOG"
          FIX_EXIT=$?
          set -e

          if [ "$FIX_EXIT" -eq 0 ]; then
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            echo "旧版 AI 修复器没有产出可用改动"
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report monitor result
        if: always()
        run: |
          echo "classification=${{ steps.inspect.outputs.classification }}"
          echo "reason=${{ steps.inspect.outputs.reason }}"
          echo "should_fix=${{ steps.inspect.outputs.should_fix }}"
          echo "codex_available=${{ steps.codex_key.outputs.available }}"
          echo "codex_outcome=${{ steps.run_codex.outcome }}"
          echo "codex_fixed=${{ steps.codex_push.outputs.fixed }}"
          echo "legacy_fixed=${{ steps.legacy_ai_fix.outputs.fixed }}"
