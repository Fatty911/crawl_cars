# 多 job：step1 与 step2–6 分离，失败可单独重跑对应 job。
name: 汽车之家爬虫
on:
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
      trigger_time:
        description: '触发时间戳'
        required: false
        default: ''
      run_profile:
        description: '运行时长配置：auto/morning/afternoon'
        required: false
        default: 'auto'
      debug_mode:
        description: '调试模式：不限时间窗口，只爬30款验证流程'
        required: false
        default: 'false'
      retry_remaining:
        description: '跳过 step1，直接运行 step2-6（使用已有 HTML 数据）'
        required: false
        default: 'false'
  repository_dispatch:
    types: [trigger-autohome]

env:
  RUN_TIME: 10800
  MORNING_RUN_TIME: 10800
  AFTERNOON_RUN_TIME: 21000
  MAX_WORKFLOW_SECONDS: 21600
  PROGRESS_COMMIT_BUFFER_SECONDS: 1800
  WINDOW_END_BUFFER_SECONDS: 900
  MAX_CARS: 0
  CRAWL_MIN_DELAY_SECONDS: 3
  CRAWL_MAX_DELAY_SECONDS: 8

concurrency:
  group: autohome-crawl-${{ github.ref }}-${{ github.event.inputs.run_profile || github.event.client_payload.run_profile || github.event_name }}
  cancel-in-progress: false

jobs:
  autohome-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare crawl period
        id: period
        env:
          FORCE_RESTART: ${{ github.event.inputs.force_restart }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
        run: |
          mkdir -p crawl_state
          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            CRAWL_PERIOD="${CN_MONTH}_H1"
          else
            CRAWL_PERIOD="${CN_MONTH}_H2"
          fi
          DONE_MARKER="crawl_state/autohome_${CRAWL_PERIOD}.done"
          CURRENT_PERIOD_FILE="crawl_state/autohome_current_period"
          echo "WORKFLOW_START_EPOCH=$(date +%s)" >> $GITHUB_ENV
          echo "CRAWL_PERIOD=$CRAWL_PERIOD" >> $GITHUB_ENV
          echo "AUTOHOME_DONE_MARKER=$DONE_MARKER" >> $GITHUB_ENV

          FORCE_RESTART="${FORCE_RESTART}"
          DEBUG_MODE="${DEBUG_MODE}"

          if [ "$FORCE_RESTART" = "true" ]; then
            rm -f "$DONE_MARKER"
          fi

          if [ "$FORCE_RESTART" != "true" ] && [ "$DEBUG_MODE" != "true" ] && [ -f "$DONE_MARKER" ]; then
            echo "$CRAWL_PERIOD 已完成全量汽车之家爬取，本半月不再爬取"
            echo "SKIP_CRAWL=true" >> $GITHUB_ENV
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "INCREMENTAL_MODE=true" >> $GITHUB_ENV

          if [ "$FORCE_RESTART" = "true" ] || [ ! -f "$CURRENT_PERIOD_FILE" ] || [ "$(cat "$CURRENT_PERIOD_FILE")" != "$CRAWL_PERIOD" ]; then
            echo "进入新的半月周期 $CRAWL_PERIOD，启用增量模式（保留已有HTML）"
            rm -f progress.json step1_done
          fi
          echo "$CRAWL_PERIOD" > "$CURRENT_PERIOD_FILE"
          echo "SKIP_CRAWL=false" >> $GITHUB_ENV
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Configure crawl window
        id: window
        if: steps.period.outputs.skip != 'true'
        env:
          PROFILE_INPUT: ${{ github.event.inputs.run_profile || github.event.client_payload.run_profile || 'auto' }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
        run: |
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "调试模式：跳过时间窗口限制，每次最多爬30车型"
            echo "MAX_CARS=30" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            python scripts/crawl_budget.py configure
            echo "MAX_CARS=0" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate delay from trigger time
        id: delay
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          echo "外部触发已经在 08:30/13:30 左右执行，不再追加随机启动延迟"
          echo "delay=0" >> "$GITHUB_OUTPUT"

      - name: Random delay
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          DELAY="${{ steps.delay.outputs.delay }}"
          if [ "$DELAY" != "0" ] && [ -n "$DELAY" ]; then
            echo "Waiting $DELAY seconds ($(($DELAY / 60)) minutes)..."
            sleep $DELAY
          else
            echo "跳过延迟"
          fi

      - uses: actions/setup-python@main
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v2
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
      - if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: pip install requests beautifulsoup4 selenium lxml PyYAML

      - name: Setup environment
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV
          echo "MINIMAX_API_KEY=*** secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=*** secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=*** secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=*** secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV

      - name: Setup proxy if configured
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        env:
          PROXY_SUBSCRIPTIONS: ${{ secrets.PROXY_SUBSCRIPTIONS }}
        run: |
          python scripts/setup_proxy_runtime.py --github-env "$GITHUB_ENV"

      - name: Restore Autohome HTML cache
        id: autohome_html_cache
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && github.event.inputs.force_restart != 'true'
        uses: actions/cache@main
        with:
          path: html
          key: autohome-html-${{ env.CRAWL_PERIOD }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            autohome-html-${{ env.CRAWL_PERIOD }}-

      - name: Report Autohome HTML cache
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && github.event.inputs.force_restart != 'true'
        run: |
          mkdir -p html
          HTML_COUNT=$(find html -type f | wc -l)
          echo "Autohome HTML cache files: $HTML_COUNT"

      - name: Restart if requested
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && github.event.inputs.force_restart == 'true'
        run: rm -f progress.json step1_done "$AUTOHOME_DONE_MARKER"

      - name: Check if step1 already done
        id: check_done
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          if [ -f "$AUTOHOME_DONE_MARKER" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Clamp step1 runtime to workflow budget
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.check_done.outputs.done != 'true' && github.event.inputs.debug_mode != 'true'
        run: python scripts/crawl_budget.py clamp --step-label step1 --skip-env STEP1_SKIP

      - name: Run step1 loop
        id: step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.check_done.outputs.done != 'true'
        run: |
          if [ "$STEP1_SKIP" = "true" ]; then
            echo "step1 已因剩余安全时间不足跳过"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set -o pipefail
          set +e
          INCREMENTAL_FLAG=""
          if [ "$INCREMENTAL_MODE" = "true" ]; then
            INCREMENTAL_FLAG="--incremental"
            echo "增量模式：只爬取新增车型"
          fi
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式运行 step1 (mihomo round-robin)"
            python scripts/test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" $INCREMENTAL_FLAG 2>&1 | tee step1_error.log
          else
            echo "无代理，直接运行 step1"
            python scripts/test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" $INCREMENTAL_FLAG 2>&1 | tee step1_error.log
          fi
          EXIT_CODE=$?
          set -e
          echo "Step1 exit code: $EXIT_CODE"

          if [ $EXIT_CODE -eq 10 ]; then
            echo "Step1 incomplete, committing progress and ending this workflow run..."
            sleep $((RANDOM % 30 + 15))
            git config --local user.email "xuerui911@gmail.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Update progress - $(date +%H:%M)"
            bash scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "Step1 failed with exit code $EXIT_CODE"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "complete=true" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"
          touch step1_done
          git config --local user.email "xuerui911@gmail.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete - $(date +%H:%M)"
          bash scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Upload Autohome HTML cache (early, after step1)
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: autohome-html-early-${{ github.run_id }}
          path: |
            html/
            progress.json
            crawl_state/model_registry_autohome.json
          retention-days: 90

      - name: Classify step1 failure
        id: classify_step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true'
        run: |
          python scripts/classify_crawl_failure.py step1_error.log --github-output "$GITHUB_OUTPUT"

      - name: Auto-fix step1 error
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true' && steps.classify_step1.outputs.should_fix == 'true'
        run: |
          echo "尝试自动修复 step1 错误 (使用新版通用修复器)..."
          python scripts/auto_fix_workflow.py step1_error.log scripts/test_autohome.py || echo "自动修复失败，继续运行"

      - name: Retry step1 after fix
        id: retry_step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true' && steps.classify_step1.outputs.should_fix == 'true'
        run: |
          set -o pipefail
          echo "修复后重试 step1..."
          rm -f step1_error.log
          set +e
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式重试 step1"
            python scripts/test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" 2>&1 | tee step1_error.log
          else
            python scripts/test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" 2>&1 | tee step1_error.log
          fi
          EXIT_CODE=$?
          set -e
          echo "Retry step1 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -eq 10 ]; then
            echo "修复后 step1 仍未完成，提交进度并结束本次运行"
            git config --local user.email "xuerui911@gmail.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Update progress after fix - $(date +%H:%M)"
            bash scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "修复后 step1 仍失败"
            exit $EXIT_CODE
          fi
          echo "complete=true" >> "$GITHUB_OUTPUT"
          touch step1_done
          git config --local user.email "xuerui911@gmail.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete after fix - $(date +%H:%M)"
          bash scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Fail unresolved step1 error
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true' && steps.classify_step1.outputs.should_fix != 'true'
        run: |
          echo "Step1 失败且不适合自动修复，终止工作流"
          exit 1

      - name: Run remaining steps
        id: remaining
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true' || github.event.inputs.retry_remaining == 'true' || github.event.inputs.debug_mode == 'true' || (steps.step1.outputs.failed == 'false' && steps.step1.conclusion == 'success'))
        run: |
          set -o pipefail
          FAILED=0
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式运行剩余步骤"
            python scripts/test_autohome.py --step 2 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 3 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 4 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 5 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 6 2>&1 | tee -a remaining_error.log || FAILED=1
          else
            echo "无代理，直接运行 remaining steps"
            python scripts/test_autohome.py --step 2 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 3 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 4 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 5 2>&1 | tee -a remaining_error.log || FAILED=1
            python scripts/test_autohome.py --step 6 2>&1 | tee -a remaining_error.log || FAILED=1
          fi
          if [ "$FAILED" -ne 0 ]; then
            echo "REMAINING_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Classify remaining failure
        id: classify_remaining
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && env.REMAINING_FAILED == 'true'
        run: |
          python scripts/classify_crawl_failure.py remaining_error.log --github-output "$GITHUB_OUTPUT"

      - name: Auto-fix remaining error
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && env.REMAINING_FAILED == 'true' && steps.classify_remaining.outputs.should_fix == 'true'
        run: |
          echo "尝试自动修复 remaining steps 错误 (使用新版通用修复器)..."
          python scripts/auto_fix_workflow.py remaining_error.log scripts/test_autohome.py || echo "自动修复失败，继续运行"

      - name: Retry remaining after fix
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && env.REMAINING_FAILED == 'true' && steps.classify_remaining.outputs.should_fix == 'true'
        run: |
          echo "修复后重试 remaining steps..."
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式重试 remaining steps"
            python scripts/test_autohome.py --step 2
            python scripts/test_autohome.py --step 3
            python scripts/test_autohome.py --step 4
            python scripts/test_autohome.py --step 5
            python scripts/test_autohome.py --step 6
          else
            python scripts/test_autohome.py --step 2
            python scripts/test_autohome.py --step 3
            python scripts/test_autohome.py --step 4
            python scripts/test_autohome.py --step 5
            python scripts/test_autohome.py --step 6
          fi

      - name: Disable proxy for GitHub artifact upload
        if: failure()
        run: |
          {
            echo "HTTP_PROXY="
            echo "HTTPS_PROXY="
            echo "ALL_PROXY="
            echo "http_proxy="
            echo "https_proxy="
            echo "all_proxy="
          } >> "$GITHUB_ENV"

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-log
          path: |
            step1_error.log
            remaining_error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Set date
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true' || github.event.inputs.retry_remaining == 'true' || github.event.inputs.debug_mode == 'true' || (steps.step1.outputs.failed == 'false' && steps.step1.conclusion == 'success'))
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Verify Autohome output
        id: verify_autohome
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true' || github.event.inputs.retry_remaining == 'true' || github.event.inputs.debug_mode == 'true' || (steps.step1.outputs.failed == 'false' && steps.step1.conclusion == 'success'))
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          incremental = os.environ.get("INCREMENTAL_MODE", "false") == "true"
          debug_mode = os.environ.get("DEBUG_MODE", "false") == "true"

          files = glob.glob("autoHome_*.json")
          if not files:
              raise SystemExit("未生成 autoHome_*.json，拒绝上传空 artifact")

          path = max(files)
          with open(path, "r", encoding="utf-8") as f:
              rows = json.load(f)

          print(f"{path}: {len(rows)} rows")
          min_rows = 5 if debug_mode else 500
          if incremental and len(rows) == 0:
              print("增量模式：无新增车型，跳过上传")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_data=false\n")
              sys.exit(0)
          elif len(rows) < min_rows:
              raise SystemExit(f"汽车之家数据只有 {len(rows)} 行，疑似未完整爬取，拒绝上传")
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_data=true\n")
          PY

      - name: Mark Autohome period complete
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true') && steps.verify_autohome.outputs.has_data == 'true' && github.event.inputs.debug_mode != 'true'
        run: |
          mkdir -p crawl_state
          touch "$AUTOHOME_DONE_MARKER"
          echo "$CRAWL_PERIOD" > crawl_state/autohome_current_period
          git config --local user.email "xuerui911@gmail.com"
          git config --local user.name "github-actions[bot]"
          git add crawl_state
          git diff --staged --quiet || git commit -m "Autohome complete for $CRAWL_PERIOD"
          bash scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Disable proxy for Autohome artifact upload
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true' || github.event.inputs.retry_remaining == 'true' || github.event.inputs.debug_mode == 'true')
        run: |
          {
            echo "HTTP_PROXY="
            echo "HTTPS_PROXY="
            echo "ALL_PROXY="
            echo "http_proxy="
            echo "https_proxy="
            echo "all_proxy="
          } >> "$GITHUB_ENV"

      - name: Upload Autohome artifact
        id: upload_autohome
        uses: actions/upload-artifact@v4
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true' || github.event.inputs.retry_remaining == 'true' || github.event.inputs.debug_mode == 'true' || (steps.step1.outputs.failed == 'false' && steps.step1.conclusion == 'success')) && steps.verify_autohome.outputs.has_data != 'false'
        with:
          name: autohome-data-${{ env.CRAWL_DATE }}
          path: |
            autoHome_*.json
          retention-days: 90

      - name: Trigger merge-and-filter workflow
        if: steps.upload_autohome.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.ACTION_PAT }}
        run: |
          if [ "${{ steps.step1.outputs.complete }}" != "true" ]; then
            echo "汽车之家爬虫未完成全量爬取，但已有部分数据，触发增量合并..."
          else
            echo "汽车之家爬虫完成，触发合并分析工作流..."
          fi
          gh workflow run merge-and-filter.yml \
            --repo ${{ github.repository }} \
            -f force_merge=false \
            -f trigger_source=autohome-crawl \
            -f trigger_time=$(date +%s)
