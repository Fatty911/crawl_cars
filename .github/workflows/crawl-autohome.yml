# 多 job：step1 与 step2–6 分离，失败可单独重跑对应 job。
name: 汽车之家爬虫
on:
  schedule:
    # UTC 01:07-03:52 = 北京时间 09:07-11:52，备用触发提高 GitHub schedule 可靠性
    - cron: '7,22,37,52 1-3 * * *'
    # UTC 05:07/05:17/05:27 = 北京时间 13:07/13:17/13:27，错过 13:30 后会自动跳过
    - cron: '7,17,27 5 * * *'
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
      trigger_time:
        description: '触发时间戳'
        required: false
        default: ''
      run_profile:
        description: '运行时长配置：auto/morning/afternoon'
        required: false
        default: 'auto'
  repository_dispatch:
    types: [trigger-autohome]

env:
  RUN_TIME: 10800
  MORNING_RUN_TIME: 10800
  AFTERNOON_RUN_TIME: 21000
  MAX_WORKFLOW_SECONDS: 21600
  PROGRESS_COMMIT_BUFFER_SECONDS: 1800
  MAX_CARS: 0
  CRAWL_MIN_DELAY_SECONDS: 3
  CRAWL_MAX_DELAY_SECONDS: 8

concurrency:
  group: autohome-crawl-${{ github.ref }}-${{ github.event.schedule || github.event.inputs.run_profile || github.event.client_payload.run_profile || github.event_name }}
  cancel-in-progress: false

jobs:
  autohome-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare crawl period
        id: period
        run: |
          mkdir -p crawl_state
          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            CRAWL_PERIOD="${CN_MONTH}_H1"
          else
            CRAWL_PERIOD="${CN_MONTH}_H2"
          fi
          DONE_MARKER="crawl_state/autohome_${CRAWL_PERIOD}.done"
          CURRENT_PERIOD_FILE="crawl_state/autohome_current_period"
          echo "WORKFLOW_START_EPOCH=$(date +%s)" >> $GITHUB_ENV
          echo "CRAWL_PERIOD=$CRAWL_PERIOD" >> $GITHUB_ENV
          echo "AUTOHOME_DONE_MARKER=$DONE_MARKER" >> $GITHUB_ENV

          EVENT_NAME="${{ github.event_name }}"
          FORCE_RESTART="${{ github.event.inputs.force_restart }}"
          if [ "$EVENT_NAME" = "schedule" ]; then
            SCHEDULE_EXPR="${{ github.event.schedule }}"
            if [ "$SCHEDULE_EXPR" = "7,22,37,52 1-3 * * *" ]; then
              SCHEDULE_PROFILE="morning"
            elif [ "$SCHEDULE_EXPR" = "7,17,27 5 * * *" ]; then
              SCHEDULE_PROFILE="afternoon"
            else
              SCHEDULE_PROFILE=""
            fi
            echo "SCHEDULE_PROFILE=$SCHEDULE_PROFILE" >> $GITHUB_ENV

            CN_HOUR_NOW=$(TZ=Asia/Shanghai date +%H)
            CN_MINUTE_NOW=$(TZ=Asia/Shanghai date +%M)
            IN_WINDOW=false
            if [ "$SCHEDULE_PROFILE" = "morning" ] && [ $((10#$CN_HOUR_NOW)) -ge 9 ] && [ $((10#$CN_HOUR_NOW)) -lt 12 ]; then
              IN_WINDOW=true
            elif [ "$SCHEDULE_PROFILE" = "morning" ] && [ $((10#$CN_HOUR_NOW)) -eq 12 ] && [ $((10#$CN_MINUTE_NOW)) -le 30 ]; then
              IN_WINDOW=true
            elif [ "$SCHEDULE_PROFILE" = "afternoon" ] && [ $((10#$CN_HOUR_NOW)) -eq 13 ] && [ $((10#$CN_MINUTE_NOW)) -le 30 ]; then
              IN_WINDOW=true
            fi
            if [ "$IN_WINDOW" != "true" ]; then
              echo "当前北京时间 ${CN_HOUR_NOW}:${CN_MINUTE_NOW} 不在 $SCHEDULE_PROFILE 允许爬取窗口，跳过本次 schedule"
              echo "SKIP_CRAWL=true" >> $GITHUB_ENV
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          if [ "$FORCE_RESTART" = "true" ]; then
            rm -f "$DONE_MARKER"
          fi

          if [ -f "$DONE_MARKER" ]; then
            echo "$CRAWL_PERIOD 已完成全量汽车之家爬取，本半月不再爬取"
            echo "SKIP_CRAWL=true" >> $GITHUB_ENV
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "INCREMENTAL_MODE=false" >> $GITHUB_ENV

          if [ "$FORCE_RESTART" = "true" ] || [ ! -f "$CURRENT_PERIOD_FILE" ] || [ "$(cat "$CURRENT_PERIOD_FILE")" != "$CRAWL_PERIOD" ]; then
            echo "进入新的半月周期 $CRAWL_PERIOD，重置汽车之家进度"
            rm -f progress.json step1_done
          fi
          echo "$CRAWL_PERIOD" > "$CURRENT_PERIOD_FILE"
          echo "SKIP_CRAWL=false" >> $GITHUB_ENV
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Configure crawl window
        id: window
        if: steps.period.outputs.skip != 'true'
        run: |
          PROFILE="${{ inputs.run_profile }}"
          if [ -n "$SCHEDULE_PROFILE" ]; then
            PROFILE="$SCHEDULE_PROFILE"
          fi
          if [ -z "$PROFILE" ] || [ "$PROFILE" = "auto" ]; then
            CN_HOUR=$(TZ=Asia/Shanghai date +%H)
            CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
            CURRENT_MINUTES=$((10#$CN_HOUR * 60 + 10#$CN_MINUTE))
            if [ "$CURRENT_MINUTES" -ge $((9 * 60)) ] && [ "$CURRENT_MINUTES" -le $((12 * 60 + 30)) ]; then
              PROFILE="morning"
            elif [ "$CURRENT_MINUTES" -ge $((13 * 60)) ] && [ "$CURRENT_MINUTES" -le $((13 * 60 + 30)) ]; then
              PROFILE="afternoon"
            else
              echo "当前北京时间 ${CN_HOUR}:${CN_MINUTE} 不在 auto 允许爬取窗口，跳过本次触发"
              echo "SKIP_CRAWL=true" >> "$GITHUB_ENV"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          case "$PROFILE" in
            morning)
              RUN_SECONDS="$MORNING_RUN_TIME"
              ;;
            afternoon)
              RUN_SECONDS="$AFTERNOON_RUN_TIME"
              ;;
            *)
              echo "未知 run_profile=$PROFILE，仅支持 auto/morning/afternoon"
              exit 1
              ;;
          esac

          CN_HOUR_NOW=$(TZ=Asia/Shanghai date +%H)
          CN_MINUTE_NOW=$(TZ=Asia/Shanghai date +%M)
          CURRENT_MINUTES=$((10#$CN_HOUR_NOW * 60 + 10#$CN_MINUTE_NOW))
          WINDOW_OK=false
          if [ "$PROFILE" = "morning" ] && [ "$CURRENT_MINUTES" -ge $((9 * 60)) ] && [ "$CURRENT_MINUTES" -le $((12 * 60 + 30)) ]; then
            WINDOW_OK=true
          elif [ "$PROFILE" = "afternoon" ] && [ "$CURRENT_MINUTES" -ge $((13 * 60)) ] && [ "$CURRENT_MINUTES" -le $((13 * 60 + 30)) ]; then
            WINDOW_OK=true
          fi
          if [ "$WINDOW_OK" != "true" ]; then
            echo "当前北京时间 ${CN_HOUR_NOW}:${CN_MINUTE_NOW} 不在 $PROFILE 允许爬取窗口，跳过本次触发"
            echo "SKIP_CRAWL=true" >> "$GITHUB_ENV"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "RUN_PROFILE=$PROFILE" >> "$GITHUB_ENV"
          echo "RUN_TIME=$RUN_SECONDS" >> "$GITHUB_ENV"
          echo "MAX_CARS=0" >> "$GITHUB_ENV"
          echo "运行配置: $PROFILE, RUN_TIME=$RUN_SECONDS 秒, MAX_CARS=0"

          # 上午动态缩短：启动得晚就少跑，12:30 前必须结束（留出缓冲时间）
          if [ "$PROFILE" = "morning" ]; then
            NOW_UTC_SECONDS=$(( $(date -u +%s) % 86400 ))
            REMAIN=$(( (4 * 3600 + 30 * 60) - NOW_UTC_SECONDS - 900 ))
            if [ "$REMAIN" -lt 300 ]; then
              echo "距 12:30 扣除 15 分钟缓冲后不足 5 分钟，跳过本次上午爬虫"
              echo "SKIP_CRAWL=true" >> $GITHUB_ENV
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ "$REMAIN" -lt "$RUN_SECONDS" ]; then
              echo "距 12:30 扣除 15 分钟缓冲后剩 ${REMAIN}s，上午 RUN_TIME 从 ${RUN_SECONDS}s 缩短到 ${REMAIN}s"
              echo "RUN_TIME=$REMAIN" >> "$GITHUB_ENV"
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Calculate delay from trigger time
        id: delay
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          TRIGGER_TIME="${{ inputs.trigger_time }}"
          if [ -n "$TRIGGER_TIME" ] && [ "$TRIGGER_TIME" != "" ]; then
            CURRENT_TIME=$(date +%s)
            WAITED=$((CURRENT_TIME - TRIGGER_TIME))
            echo "触发器已等待 $WAITED 秒"
            TARGET_DELAY=1800
            if [ "$RUN_PROFILE" = "morning" ]; then
              WINDOW_END_MINUTES=$((12 * 60 + 30))
            elif [ "$RUN_PROFILE" = "afternoon" ]; then
              WINDOW_END_MINUTES=$((13 * 60 + 30))
            else
              WINDOW_END_MINUTES=0
            fi
            if [ "$WINDOW_END_MINUTES" -gt 0 ]; then
              CN_HOUR=$(TZ=Asia/Shanghai date +%H)
              CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
              CURRENT_MINUTES=$((10#$CN_HOUR * 60 + 10#$CN_MINUTE))
              WINDOW_REMAIN=$(((WINDOW_END_MINUTES - CURRENT_MINUTES) * 60))
              if [ "$WINDOW_REMAIN" -lt 0 ]; then
                WINDOW_REMAIN=0
              fi
              if [ "$TARGET_DELAY" -gt "$WINDOW_REMAIN" ]; then
                TARGET_DELAY="$WINDOW_REMAIN"
              fi
            fi
            if [ $WAITED -lt $TARGET_DELAY ]; then
              REMAIN=$((TARGET_DELAY - WAITED))
              echo "剩余延迟: $REMAIN 秒"
              echo "delay=$REMAIN" >> $GITHUB_OUTPUT
            else
              echo "无需额外延迟"
              echo "delay=0" >> $GITHUB_OUTPUT
            fi
          else
            DELAY=$((RANDOM % 600))
            if [ "$RUN_PROFILE" = "morning" ]; then
              DELAY=0
            elif [ "$RUN_PROFILE" = "afternoon" ]; then
              CN_HOUR=$(TZ=Asia/Shanghai date +%H)
              CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
              CURRENT_MINUTES=$((10#$CN_HOUR * 60 + 10#$CN_MINUTE))
              WINDOW_REMAIN=$(((13 * 60 + 30 - CURRENT_MINUTES) * 60))
              if [ "$WINDOW_REMAIN" -lt 0 ]; then
                WINDOW_REMAIN=0
              fi
              if [ "$DELAY" -gt "$WINDOW_REMAIN" ]; then
                DELAY="$WINDOW_REMAIN"
              fi
            fi
            echo "delay=$DELAY" >> $GITHUB_OUTPUT
          fi

      - name: Random delay
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          DELAY="${{ steps.delay.outputs.delay }}"
          if [ "$DELAY" != "0" ] && [ -n "$DELAY" ]; then
            echo "Waiting $DELAY seconds ($(($DELAY / 60)) minutes)..."
            sleep $DELAY
          else
            echo "跳过延迟"
          fi

      - uses: actions/setup-python@main
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v2
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
      - if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: pip install requests beautifulsoup4 selenium lxml PyYAML

      - name: Setup environment
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV

      - name: Setup proxy if configured
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        env:
          PROXY_SUBSCRIPTIONS: ${{ secrets.PROXY_SUBSCRIPTIONS }}
        run: |
          python custom_scripts/setup_proxy_runtime.py --github-env "$GITHUB_ENV"

      - name: Restart if requested
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && github.event.inputs.force_restart == 'true'
        run: rm -f progress.json step1_done "$AUTOHOME_DONE_MARKER"

      - name: Check if step1 already done
        id: check_done
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          if [ -f "$AUTOHOME_DONE_MARKER" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Clamp step1 runtime to workflow budget
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.check_done.outputs.done != 'true'
        run: |
          NOW=$(date +%s)
          ELAPSED=$((NOW - WORKFLOW_START_EPOCH))
          SAFE_REMAIN=$((MAX_WORKFLOW_SECONDS - ELAPSED - PROGRESS_COMMIT_BUFFER_SECONDS))
          echo "workflow elapsed=${ELAPSED}s, safe step1 remain=${SAFE_REMAIN}s, requested RUN_TIME=${RUN_TIME}s"
          if [ "$SAFE_REMAIN" -lt 300 ]; then
            echo "剩余安全时间不足 5 分钟，跳过 step1，避免 GitHub 6 小时硬超时导致进度无法提交"
            echo "STEP1_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ "$SAFE_REMAIN" -lt "$RUN_TIME" ]; then
            echo "RUN_TIME 从 ${RUN_TIME}s 缩短到 ${SAFE_REMAIN}s，预留 ${PROGRESS_COMMIT_BUFFER_SECONDS}s 提交进度缓冲"
            echo "RUN_TIME=$SAFE_REMAIN" >> "$GITHUB_ENV"
          fi

      - name: Run step1 loop
        id: step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.check_done.outputs.done != 'true'
        run: |
          if [ "$STEP1_SKIP" = "true" ]; then
            echo "step1 已因剩余安全时间不足跳过"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set -o pipefail
          set +e
          INCREMENTAL_FLAG=""
          if [ "$INCREMENTAL_MODE" = "true" ]; then
            INCREMENTAL_FLAG="--incremental"
            echo "增量模式：只爬取新增车型"
          fi
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式运行 step1 (mihomo round-robin)"
            python test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" $INCREMENTAL_FLAG 2>&1 | tee step1_error.log
          else
            echo "无代理，直接运行 step1"
            python test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" $INCREMENTAL_FLAG 2>&1 | tee step1_error.log
          fi
          EXIT_CODE=$?
          set -e
          echo "Step1 exit code: $EXIT_CODE"

          if [ $EXIT_CODE -eq 10 ]; then
            echo "Step1 incomplete, committing progress and ending this workflow run..."
            sleep $((RANDOM % 30 + 15))
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Update progress - $(date +%H:%M)"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "Step1 failed with exit code $EXIT_CODE"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "complete=true" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"
          touch step1_done
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete - $(date +%H:%M)"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Classify step1 failure
        id: classify_step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true'
        run: |
          python custom_scripts/classify_crawl_failure.py step1_error.log --github-output "$GITHUB_OUTPUT"

      - name: Auto-fix step1 error
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true' && steps.classify_step1.outputs.should_fix == 'true'
        run: |
          echo "尝试自动修复 step1 错误 (使用新版通用修复器)..."
          python auto_fix_workflow.py step1_error.log test_autohome.py || echo "自动修复失败，继续运行"

      - name: Retry step1 after fix
        id: retry_step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true' && steps.classify_step1.outputs.should_fix == 'true'
        run: |
          set -o pipefail
          echo "修复后重试 step1..."
          rm -f step1_error.log
          set +e
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式重试 step1"
            python test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" 2>&1 | tee step1_error.log
          else
            python test_autohome.py --step 1 --auto --time-limit "$RUN_TIME" --max-cars "$MAX_CARS" 2>&1 | tee step1_error.log
          fi
          EXIT_CODE=$?
          set -e
          echo "Retry step1 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -eq 10 ]; then
            echo "修复后 step1 仍未完成，提交进度并结束本次运行"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Update progress after fix - $(date +%H:%M)"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "修复后 step1 仍失败"
            exit $EXIT_CODE
          fi
          echo "complete=true" >> "$GITHUB_OUTPUT"
          touch step1_done
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete after fix - $(date +%H:%M)"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Fail unresolved step1 error
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed == 'true' && steps.classify_step1.outputs.should_fix != 'true'
        run: |
          echo "Step1 失败且不适合自动修复，终止工作流"
          exit 1

      - name: Run remaining steps
        id: remaining
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true')
        run: |
          set -o pipefail
          FAILED=0
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式运行剩余步骤"
            python test_autohome.py --step 2 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 3 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 4 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 5 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 6 2>&1 | tee -a remaining_error.log || FAILED=1
          else
            echo "无代理，直接运行 remaining steps"
            python test_autohome.py --step 2 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 3 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 4 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 5 2>&1 | tee -a remaining_error.log || FAILED=1
            python test_autohome.py --step 6 2>&1 | tee -a remaining_error.log || FAILED=1
          fi
          if [ "$FAILED" -ne 0 ]; then
            echo "REMAINING_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Classify remaining failure
        id: classify_remaining
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && env.REMAINING_FAILED == 'true'
        run: |
          python custom_scripts/classify_crawl_failure.py remaining_error.log --github-output "$GITHUB_OUTPUT"

      - name: Auto-fix remaining error
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && env.REMAINING_FAILED == 'true' && steps.classify_remaining.outputs.should_fix == 'true'
        run: |
          echo "尝试自动修复 remaining steps 错误 (使用新版通用修复器)..."
          python auto_fix_workflow.py remaining_error.log test_autohome.py || echo "自动修复失败，继续运行"

      - name: Retry remaining after fix
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && env.REMAINING_FAILED == 'true' && steps.classify_remaining.outputs.should_fix == 'true'
        run: |
          echo "修复后重试 remaining steps..."
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式重试 remaining steps"
            python test_autohome.py --step 2
            python test_autohome.py --step 3
            python test_autohome.py --step 4
            python test_autohome.py --step 5
            python test_autohome.py --step 6
          else
            python test_autohome.py --step 2
            python test_autohome.py --step 3
            python test_autohome.py --step 4
            python test_autohome.py --step 5
            python test_autohome.py --step 6
          fi

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: error-log
          path: |
            step1_error.log
            remaining_error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Set date
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true')
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Verify Autohome output
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true')
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          incremental = os.environ.get("INCREMENTAL_MODE", "false") == "true"

          files = glob.glob("autoHome_*.json")
          if not files:
              raise SystemExit("未生成 autoHome_*.json，拒绝上传空 artifact")

          path = max(files)
          with open(path, "r", encoding="utf-8") as f:
              rows = json.load(f)

          print(f"{path}: {len(rows)} rows")
          if incremental and len(rows) == 0:
              print("增量模式：无新增车型，跳过上传")
              sys.exit(0)
          elif len(rows) < 50:
              raise SystemExit(f"汽车之家数据只有 {len(rows)} 行，疑似未完整爬取，拒绝上传")
          PY

      - name: Mark Autohome period complete
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true')
        run: |
          mkdir -p crawl_state
          touch "$AUTOHOME_DONE_MARKER"
          echo "$CRAWL_PERIOD" > crawl_state/autohome_current_period
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add crawl_state
          git diff --staged --quiet || git commit -m "Autohome complete for $CRAWL_PERIOD"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - uses: actions/upload-artifact@main
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && (steps.step1.outputs.complete == 'true' || steps.retry_step1.outputs.complete == 'true')
        with:
          name: autohome-data-${{ env.CRAWL_DATE }}
          path: |
            autoHome_*.json
          retention-days: 90
