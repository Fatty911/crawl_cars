name: 汽车之家爬虫
on:
  # push:
  #   branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'
    - cron: '0 14 * * 4'
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'

env:
  RUN_TIME: 7200
  MAX_CARS: 500

jobs:
  crawl-autohome:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Random delay to mimic human behavior
        run: |
          DELAY=$((RANDOM % 3600 + 3600))
          echo "Waiting $DELAY seconds ($(($DELAY / 60)) minutes) before starting..."
          sleep $DELAY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml PyYAML
      
      - name: Setup environment
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV
          echo "PROXY_SUBSCRIPTIONS=${{ secrets.PROXY_SUBSCRIPTIONS }}" >> $GITHUB_ENV
      
      - name: Setup proxy if configured
        run: |
          if [ -n "${{ secrets.PROXY_SUBSCRIPTIONS }}" ]; then
            echo "检测到 PROXY_SUBSCRIPTIONS，开始配置代理..."
            echo '${{ secrets.PROXY_SUBSCRIPTIONS }}' > proxies.json
            echo "已创建 proxies.json，包含订阅链接"
            cat proxies.json
          else
            echo "未配置 PROXY_SUBSCRIPTIONS，将直接爬取（不使用代理）"
            rm -f proxies.json
          fi
      
      - name: Restart if requested
        if: github.event.inputs.force_restart == 'true'
        run: rm -f progress.json step1_done
      
      - name: Check if step1 already done
        id: check_done
        run: |
          if [ -f step1_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run step1 loop
        id: step1
        if: steps.check_done.outputs.done != 'true'
        run: |
          while true; do
            if [ -f proxies.json ]; then
              echo "使用代理模式运行 step1 (负载均衡)"
              python run_with_proxy.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} --max-cars ${{ env.MAX_CARS }} --proxy round_robin 2>&1 | tee step1_error.log
            else
              echo "无代理，直接运行 step1"
              python test_autohome.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} --max-cars ${{ env.MAX_CARS }} 2>&1 | tee step1_error.log
            fi
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 10 ]; then
              echo "Step1 incomplete, committing progress..."
              sleep $((RANDOM % 60 + 30))
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add -A
              git diff --staged --quiet || git commit -m "Update progress - $(date +%H:%M)"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              echo "Re-running step1..."
              sleep $((RANDOM % 120 + 60))
              git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            elif [ $EXIT_CODE -ne 0 ]; then
              echo "Step1 failed with exit code $EXIT_CODE"
              echo "STEP1_FAILED=true" >> $GITHUB_ENV
              break
            else
              break
            fi
          done
          touch step1_done
          sleep $((RANDOM % 60 + 30))
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete - $(date +%H:%M)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      
      - name: Auto-fix step1 error
        if: env.STEP1_FAILED == 'true'
        run: |
          echo "尝试自动修复 step1 错误 (使用新版通用修复器)..."
          python auto_fix_workflow.py step1_error.log test_autohome.py || echo "自动修复失败，继续运行"
      
      - name: Retry step1 after fix
        if: env.STEP1_FAILED == 'true'
        run: |
          echo "修复后重试 step1..."
          rm -f step1_error.log
          if [ -f proxies.json ]; then
            python run_with_proxy.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} --max-cars ${{ env.MAX_CARS }} --proxy random
          else
            python test_autohome.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} --max-cars ${{ env.MAX_CARS }}
          fi
          
      - name: Run remaining steps
        id: remaining
        run: |
          if [ -f proxies.json ]; then
            echo "使用代理模式运行剩余步骤"
            python run_with_proxy.py --skip-dongchedi --proxy round_robin 2>&1 | tee remaining_error.log
          else
            echo "无代理，直接运行 remaining steps"
            python test_autohome.py --step 2 2>&1 | tee -a remaining_error.log
            python test_autohome.py --step 3 2>&1 | tee -a remaining_error.log
            python test_autohome.py --step 4 2>&1 | tee -a remaining_error.log
            python test_autohome.py --step 5 2>&1 | tee -a remaining_error.log
            python test_autohome.py --step 6 2>&1 | tee -a remaining_error.log
          fi
          if [ $? -ne 0 ]; then
            echo "REMAINING_FAILED=true" >> $GITHUB_ENV
          fi
      
      - name: Auto-fix remaining error
        if: env.REMAINING_FAILED == 'true'
        run: |
          echo "尝试自动修复 remaining steps 错误 (使用新版通用修复器)..."
          python auto_fix_workflow.py remaining_error.log test_autohome.py || echo "自动修复失败，继续运行"
      
      - name: Retry remaining after fix
        if: env.REMAINING_FAILED == 'true'
        run: |
          echo "修复后重试 remaining steps..."
          if [ -f proxies.json ]; then
            python run_with_proxy.py --skip-dongchedi --proxy random
          else
            python test_autohome.py --step 2
            python test_autohome.py --step 3
            python test_autohome.py --step 4
            python test_autohome.py --step 5
            python test_autohome.py --step 6
          fi
      
      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: autohome-data-${{ env.CRAWL_DATE }}
          path: |
            autoHome_*.json
          retention-days: 90