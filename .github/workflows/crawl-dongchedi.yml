# 多 job：step1 / step2 / step3–4 分离，失败可单独重跑；进度在仓库内 dcd_step2_done 等。
name: 懂车帝爬虫
on:
  schedule:
    # UTC 01:07-03:52 = 北京时间 09:07-11:52，备用触发提高 GitHub schedule 可靠性
    - cron: '7,22,37,52 1-3 * * *'
    # UTC 05:07/05:17/05:27 = 北京时间 13:07/13:17/13:27，错过 13:30 后会自动跳过
    - cron: '7,17,27 5 * * *'
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
      trigger_time:
        description: '触发时间戳'
        required: false
        default: ''
      run_profile:
        description: '运行时长配置：auto/morning/afternoon'
        required: false
        default: 'auto'
  repository_dispatch:
    types: [trigger-dongchedi]

env:
  RUN_TIME: 10800
  MORNING_RUN_TIME: 10800
  AFTERNOON_RUN_TIME: 21000
  MAX_CARS: 0
  CRAWL_MIN_DELAY_SECONDS: 3
  CRAWL_MAX_DELAY_SECONDS: 8

concurrency:
  group: dongchedi-crawl-${{ github.ref }}-${{ github.event.schedule || github.event.inputs.run_profile || github.event.client_payload.run_profile || 'manual' }}
  cancel-in-progress: false

jobs:
  dongchedi-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare crawl period
        id: period
        run: |
          mkdir -p crawl_state
          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            CRAWL_PERIOD="${CN_MONTH}_H1"
          else
            CRAWL_PERIOD="${CN_MONTH}_H2"
          fi
          DONE_MARKER="crawl_state/dongchedi_${CRAWL_PERIOD}.done"
          CURRENT_PERIOD_FILE="crawl_state/dongchedi_current_period"
          echo "CRAWL_PERIOD=$CRAWL_PERIOD" >> $GITHUB_ENV
          echo "DONGCHEDI_DONE_MARKER=$DONE_MARKER" >> $GITHUB_ENV

          EVENT_NAME="${{ github.event_name }}"
          FORCE_RESTART="${{ github.event.inputs.force_restart }}"
          if [ "$EVENT_NAME" = "schedule" ]; then
            SCHEDULE_EXPR="${{ github.event.schedule }}"
            if [ "$SCHEDULE_EXPR" = "7,22,37,52 1-3 * * *" ]; then
              SCHEDULE_PROFILE="morning"
            elif [ "$SCHEDULE_EXPR" = "7,17,27 5 * * *" ]; then
              SCHEDULE_PROFILE="afternoon"
            else
              SCHEDULE_PROFILE=""
            fi
            echo "SCHEDULE_PROFILE=$SCHEDULE_PROFILE" >> $GITHUB_ENV

            CN_HOUR_NOW=$(TZ=Asia/Shanghai date +%H)
            CN_MINUTE_NOW=$(TZ=Asia/Shanghai date +%M)
            IN_WINDOW=false
            if [ "$SCHEDULE_PROFILE" = "morning" ] && [ $((10#$CN_HOUR_NOW)) -ge 9 ] && [ $((10#$CN_HOUR_NOW)) -lt 14 ]; then
              IN_WINDOW=true
            elif [ "$SCHEDULE_PROFILE" = "afternoon" ] && [ $((10#$CN_HOUR_NOW)) -ge 13 ] && [ $((10#$CN_HOUR_NOW)) -lt 16 ]; then
              IN_WINDOW=true
            fi
            if [ "$IN_WINDOW" != "true" ]; then
              echo "当前北京时间 ${CN_HOUR_NOW}:${CN_MINUTE_NOW} 不在 $SCHEDULE_PROFILE 允许爬取窗口，跳过本次 schedule"
              echo "SKIP_CRAWL=true" >> $GITHUB_ENV
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          if [ "$FORCE_RESTART" = "true" ]; then
            rm -f "$DONE_MARKER"
          fi

          if [ -f "$DONE_MARKER" ]; then
            echo "$CRAWL_PERIOD 已完成全量懂车帝爬取，本半月不再爬取"
            echo "SKIP_CRAWL=true" >> $GITHUB_ENV
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$FORCE_RESTART" = "true" ] || [ ! -f "$CURRENT_PERIOD_FILE" ] || [ "$(cat "$CURRENT_PERIOD_FILE")" != "$CRAWL_PERIOD" ]; then
            echo "进入新的半月周期 $CRAWL_PERIOD，重置懂车帝进度"
            rm -f dcd_step2_done
            python custom_scripts/reset_dongchedi_progress.py
            rm -f dongchedi/json/*.html
          fi
          echo "$CRAWL_PERIOD" > "$CURRENT_PERIOD_FILE"
          echo "SKIP_CRAWL=false" >> $GITHUB_ENV
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Configure crawl window
        if: steps.period.outputs.skip != 'true'
        run: |
          PROFILE="${{ inputs.run_profile }}"
          if [ -n "$SCHEDULE_PROFILE" ]; then
            PROFILE="$SCHEDULE_PROFILE"
          fi
          if [ -z "$PROFILE" ] || [ "$PROFILE" = "auto" ]; then
            CN_HOUR=$(TZ=Asia/Shanghai date +%H)
            CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
            if [ $((10#$CN_HOUR)) -ge 9 ] && [ $((10#$CN_HOUR)) -lt 14 ]; then
              PROFILE="morning"
            elif [ $((10#$CN_HOUR)) -ge 13 ] && [ $((10#$CN_HOUR)) -lt 16 ]; then
              PROFILE="afternoon"
            else
              PROFILE="afternoon"
            fi
          fi

          case "$PROFILE" in
            morning)
              RUN_SECONDS="$MORNING_RUN_TIME"
              ;;
            afternoon)
              RUN_SECONDS="$AFTERNOON_RUN_TIME"
              ;;
            *)
              echo "未知 run_profile=$PROFILE，仅支持 auto/morning/afternoon"
              exit 1
              ;;
          esac

          echo "RUN_PROFILE=$PROFILE" >> "$GITHUB_ENV"
          echo "RUN_TIME=$RUN_SECONDS" >> "$GITHUB_ENV"
          echo "MAX_CARS=0" >> "$GITHUB_ENV"
          echo "运行配置: $PROFILE, RUN_TIME=$RUN_SECONDS 秒, MAX_CARS=0"

          # 上午动态缩短：启动得晚就少跑，14:30 前必须结束（留出缓冲时间）
          if [ "$PROFILE" = "morning" ]; then
            NOW_UTC_SECONDS=$(( $(date -u +%s) % 86400 ))
            REMAIN=$(( (6 * 3600 + 30 * 60) - NOW_UTC_SECONDS - 900 ))
            if [ "$REMAIN" -lt 300 ]; then
              echo "距 14:30 扣除 15 分钟缓冲后不足 5 分钟，跳过本次上午爬虫"
              echo "SKIP_CRAWL=true" >> $GITHUB_ENV
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ "$REMAIN" -lt "$RUN_SECONDS" ]; then
              echo "距 14:30 扣除 15 分钟缓冲后剩 ${REMAIN}s，上午 RUN_TIME 从 ${RUN_SECONDS}s 缩短到 ${REMAIN}s"
              echo "RUN_TIME=$REMAIN" >> "$GITHUB_ENV"
            fi
          fi
            if [ "$REMAIN" -lt "$RUN_SECONDS" ]; then
              echo "距 12:30 扣除 15 分钟缓冲后剩 ${REMAIN}s，上午 RUN_TIME 从 ${RUN_SECONDS}s 缩短到 ${REMAIN}s"
              echo "RUN_TIME=$REMAIN" >> "$GITHUB_ENV"
            fi
          fi

      - name: Calculate delay from trigger time
        id: delay
        if: steps.period.outputs.skip != 'true'
        run: |
          TRIGGER_TIME="${{ inputs.trigger_time }}"
          if [ -n "$TRIGGER_TIME" ] && [ "$TRIGGER_TIME" != "" ]; then
            CURRENT_TIME=$(date +%s)
            WAITED=$((CURRENT_TIME - TRIGGER_TIME))
            echo "触发器已等待 $WAITED 秒"
            TARGET_DELAY=1800
            if [ "$RUN_PROFILE" = "morning" ]; then
              WINDOW_END_MINUTES=$((12 * 60 + 30))
            elif [ "$RUN_PROFILE" = "afternoon" ]; then
              WINDOW_END_MINUTES=$((13 * 60 + 30))
            else
              WINDOW_END_MINUTES=0
            fi
            if [ "$WINDOW_END_MINUTES" -gt 0 ]; then
              CN_HOUR=$(TZ=Asia/Shanghai date +%H)
              CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
              CURRENT_MINUTES=$((10#$CN_HOUR * 60 + 10#$CN_MINUTE))
              WINDOW_REMAIN=$(((WINDOW_END_MINUTES - CURRENT_MINUTES) * 60))
              if [ "$WINDOW_REMAIN" -lt 0 ]; then
                WINDOW_REMAIN=0
              fi
              if [ "$TARGET_DELAY" -gt "$WINDOW_REMAIN" ]; then
                TARGET_DELAY="$WINDOW_REMAIN"
              fi
            fi
            if [ $WAITED -lt $TARGET_DELAY ]; then
              REMAIN=$((TARGET_DELAY - WAITED))
              echo "剩余延迟: $REMAIN 秒"
              echo "delay=$REMAIN" >> $GITHUB_OUTPUT
            else
              echo "无需额外延迟"
              echo "delay=0" >> $GITHUB_OUTPUT
            fi
          else
            DELAY=$((RANDOM % 600))
            if [ "$RUN_PROFILE" = "morning" ]; then
              DELAY=0
            elif [ "$RUN_PROFILE" = "afternoon" ]; then
              CN_HOUR=$(TZ=Asia/Shanghai date +%H)
              CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
              CURRENT_MINUTES=$((10#$CN_HOUR * 60 + 10#$CN_MINUTE))
              WINDOW_REMAIN=$(((13 * 60 + 30 - CURRENT_MINUTES) * 60))
              if [ "$WINDOW_REMAIN" -lt 0 ]; then
                WINDOW_REMAIN=0
              fi
              if [ "$DELAY" -gt "$WINDOW_REMAIN" ]; then
                DELAY="$WINDOW_REMAIN"
              fi
            fi
            echo "delay=$DELAY" >> $GITHUB_OUTPUT
          fi

      - name: Random delay
        if: steps.period.outputs.skip != 'true'
        run: |
          DELAY="${{ steps.delay.outputs.delay }}"
          if [ "$DELAY" != "0" ] && [ -n "$DELAY" ]; then
            echo "Waiting $DELAY seconds ($(($DELAY / 60)) minutes)..."
            sleep $DELAY
          else
            echo "跳过延迟"
          fi

      - name: Force restart if requested
        if: steps.period.outputs.skip != 'true' && github.event.inputs.force_restart == 'true'
        run: |
          rm -f dcd_step2_done "$DONGCHEDI_DONE_MARKER"
          python custom_scripts/reset_dongchedi_progress.py
          rm -f dongchedi/json/*.html
          echo "已重置所有进度"

      - uses: actions/setup-python@main
        if: steps.period.outputs.skip != 'true'
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v2
        if: steps.period.outputs.skip != 'true'
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
        if: steps.period.outputs.skip != 'true'
      - if: steps.period.outputs.skip != 'true'
        run: pip install requests beautifulsoup4 selenium lxml PyYAML

      - name: Setup environment
        if: steps.period.outputs.skip != 'true'
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV

      - name: Setup proxy if configured
        if: steps.period.outputs.skip != 'true'
        env:
          PROXY_SUBSCRIPTIONS: ${{ secrets.PROXY_SUBSCRIPTIONS }}
        run: |
          python custom_scripts/setup_proxy_runtime.py --github-env "$GITHUB_ENV"

      - name: Check if step2 already done
        id: check_done_dcd
        if: steps.period.outputs.skip != 'true'
        run: |
          if [ -f "$DONGCHEDI_DONE_MARKER" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step1 to get series list
        if: steps.period.outputs.skip != 'true' && steps.check_done_dcd.outputs.done != 'true'
        run: |
          set -o pipefail
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式运行 step1 (mihomo round-robin)"
            python crawl_dongchedi.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} 2>&1 | tee step1_error.log
          else
            echo "无代理，直接运行 step1"
            python crawl_dongchedi.py --step 1 --auto --time-limit ${{ env.RUN_TIME }}
          fi
          if [ -f dongchedi/progress.json ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Dongchedi step1 - series list - $(date +%H:%M)"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          fi

      - name: Run step2 loop
        id: step2
        if: steps.period.outputs.skip != 'true' && steps.check_done_dcd.outputs.done != 'true'
        run: |
          set -o pipefail
          set +e
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式运行 step2 (mihomo round-robin)"
            python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }} 2>&1 | tee step2_error.log
          else
            echo "无代理，直接运行 step2"
            python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }} 2>&1 | tee step2_error.log
          fi
          EXIT_CODE=$?
          set -e
          echo "Exit code: $EXIT_CODE"

          if [ $EXIT_CODE -eq 10 ]; then
            echo "Step2 incomplete, committing progress and ending this workflow run..."
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Update dongchedi progress - $(date +%H:%M)"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "Step2 failed with exit code $EXIT_CODE"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Step2 finished successfully"
          echo "complete=true" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"
          touch dcd_step2_done
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Dongchedi step2 complete - $(date +%H:%M)"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Classify step2 failure
        id: classify_step2
        if: steps.period.outputs.skip != 'true' && steps.step2.outputs.failed == 'true'
        run: |
          python custom_scripts/classify_crawl_failure.py step2_error.log --github-output "$GITHUB_OUTPUT"

      - name: Auto-fix step2 error
        if: steps.period.outputs.skip != 'true' && steps.step2.outputs.failed == 'true' && steps.classify_step2.outputs.should_fix == 'true'
        run: |
          echo "尝试自动修复 step2 错误 (使用新版通用修复器)..."
          python auto_fix_workflow.py step2_error.log crawl_dongchedi.py || echo "自动修复失败，继续运行"

      - name: Retry step2 after fix
        id: retry_step2
        if: steps.period.outputs.skip != 'true' && steps.step2.outputs.failed == 'true' && steps.classify_step2.outputs.should_fix == 'true'
        run: |
          set -o pipefail
          echo "修复后重试 step2..."
          rm -f step2_error.log
          set +e
          if [ "$PROXY_ENABLED" = "true" ]; then
            echo "使用代理模式重试 step2"
            python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }} 2>&1 | tee step2_error.log
          else
            python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }} 2>&1 | tee step2_error.log
          fi
          EXIT_CODE=$?
          set -e
          echo "Retry step2 exit code: $EXIT_CODE"
          if [ $EXIT_CODE -eq 10 ]; then
            echo "修复后 step2 仍未完成，提交进度并结束本次运行"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Update dongchedi progress after fix - $(date +%H:%M)"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "修复后 step2 仍失败"
            exit $EXIT_CODE
          fi
          echo "complete=true" >> "$GITHUB_OUTPUT"
          touch dcd_step2_done
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Dongchedi step2 complete after fix - $(date +%H:%M)"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Fail unresolved step2 error
        if: steps.period.outputs.skip != 'true' && steps.step2.outputs.failed == 'true' && steps.classify_step2.outputs.should_fix != 'true'
        run: |
          echo "Step2 失败且不适合自动修复，终止工作流"
          exit 1

      - name: Upload error log
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: error-log
          path: |
            step1_error.log
            step2_error.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Run step3 and step4
        if: steps.period.outputs.skip != 'true' && (steps.step2.outputs.complete == 'true' || steps.retry_step2.outputs.complete == 'true')
        run: |
          python crawl_dongchedi.py --step 3
          python crawl_dongchedi.py --step 4

      - name: Set date
        if: steps.period.outputs.skip != 'true' && (steps.step2.outputs.complete == 'true' || steps.retry_step2.outputs.complete == 'true')
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Verify Dongchedi output
        if: steps.period.outputs.skip != 'true' && (steps.step2.outputs.complete == 'true' || steps.retry_step2.outputs.complete == 'true')
        run: |
          python - <<'PY'
          import glob
          import json

          files = glob.glob("dongchedi_*.json")
          if not files:
              raise SystemExit("未生成 dongchedi_*.json，拒绝上传空 artifact")

          path = max(files)
          with open(path, "r", encoding="utf-8") as f:
              rows = json.load(f)

          print(f"{path}: {len(rows)} rows")
          if len(rows) < 50:
              raise SystemExit(f"懂车帝数据只有 {len(rows)} 行，疑似未完整爬取，拒绝上传")
          PY

      - name: Mark Dongchedi period complete
        if: steps.period.outputs.skip != 'true' && (steps.step2.outputs.complete == 'true' || steps.retry_step2.outputs.complete == 'true')
        run: |
          mkdir -p crawl_state
          touch "$DONGCHEDI_DONE_MARKER"
          echo "$CRAWL_PERIOD" > crawl_state/dongchedi_current_period
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add crawl_state
          git diff --staged --quiet || git commit -m "Dongchedi complete for $CRAWL_PERIOD"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - uses: actions/upload-artifact@main
        if: steps.period.outputs.skip != 'true' && (steps.step2.outputs.complete == 'true' || steps.retry_step2.outputs.complete == 'true')
        with:
          name: dongchedi-data-${{ env.CRAWL_DATE }}
          path: |
            dongchedi_*.json
          retention-days: 90
