# 多 job：step1 / step2 / step3–4 分离，失败可单独重跑；进度在仓库内 dcd_step2_done 等。
name: 懂车帝爬虫
on:
  schedule:
    - cron: '0 2 * * 2'
    - cron: '0 14 * * 5'
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'

env:
  RUN_TIME: 7200
  MAX_CARS: 500

jobs:
  dongchedi-step1:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Random delay (5-20min for free tier)
        run: |
          DELAY=$((RANDOM % 900 + 300))
          echo "Waiting $DELAY seconds ($(($DELAY / 60)) minutes)..."
          sleep $DELAY

      - name: Force restart if requested
        if: github.event.inputs.force_restart == 'true'
        run: |
          rm -f dcd_step2_done dongchedi/progress.json
          rm -f dongchedi/json/*.html
          echo "已重置所有进度"

      - uses: actions/setup-python@main
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@master
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@master
      - run: pip install requests beautifulsoup4 selenium lxml PyYAML

      - name: Setup environment
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV
          echo "PROXY_SUBSCRIPTIONS<<EOF" >> $GITHUB_ENV
          echo '${{ secrets.PROXY_SUBSCRIPTIONS }}' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup proxy if configured
        run: |
          if [ -n "$PROXY_SUBSCRIPTIONS" ]; then
            echo "检测到 PROXY_SUBSCRIPTIONS，开始配置代理..."
            echo "$PROXY_SUBSCRIPTIONS" > /tmp/proxies.json
            echo "已写入临时文件 /tmp/proxies.json（不进仓库）"
          else
            echo "未配置 PROXY_SUBSCRIPTIONS，将直接爬取（不使用代理）"
            rm -f /tmp/proxies.json
          fi

      - name: Check if step2 already done
        id: check_done_dcd
        run: |
          if [ -f dcd_step2_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step1 to get series list
        if: steps.check_done_dcd.outputs.done != 'true'
        run: |
          if [ -f proxies.json ]; then
            echo "使用代理模式运行 step1"
            python run_with_proxy.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} 2>&1 | tee step1_error.log
          else
            echo "无代理，直接运行 step1"
            python crawl_dongchedi.py --step 1 --auto --time-limit ${{ env.RUN_TIME }}
          fi
          if [ -f dongchedi/progress.json ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Dongchedi step1 - series list - $(date +%H:%M)"
            git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi

  dongchedi-step2:
    needs: [dongchedi-step1]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: actions/setup-python@main
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@master
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@master
      - run: pip install requests beautifulsoup4 selenium lxml PyYAML

      - name: Setup environment
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV
          echo "PROXY_SUBSCRIPTIONS<<EOF" >> $GITHUB_ENV
          echo '${{ secrets.PROXY_SUBSCRIPTIONS }}' >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup proxy if configured
        run: |
          if [ -n "$PROXY_SUBSCRIPTIONS" ]; then
            echo "$PROXY_SUBSCRIPTIONS" > /tmp/proxies.json
          else
            rm -f /tmp/proxies.json
          fi

      - name: Check if step2 already done
        id: check_done_dcd
        run: |
          if [ -f dcd_step2_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step2 loop
        id: step2
        if: steps.check_done_dcd.outputs.done != 'true'
        run: |
          RUN_COUNT=0
          STEP2_FAILED=false
          while true; do
            RUN_COUNT=$((RUN_COUNT + 1))
            echo "=== Step2 run #$RUN_COUNT ==="
            if [ -f proxies.json ]; then
              echo "使用代理模式运行 step2 (round_robin)"
              python run_with_proxy.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }} --proxy round_robin 2>&1 | tee step2_error.log
            else
              echo "无代理，直接运行 step2"
              python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }} 2>&1 | tee step2_error.log
            fi
            EXIT_CODE=$?
            echo "Exit code: $EXIT_CODE"

            if [ $EXIT_CODE -eq 10 ]; then
              echo "Step2 incomplete, committing progress..."
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add -A
              git diff --staged --quiet || git commit -m "Update dongchedi progress - $(date +%H:%M)"
              git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              echo "Re-running step2..."
              sleep $((RANDOM % 15 + 5))
            elif [ $EXIT_CODE -ne 0 ]; then
              echo "Step2 failed with exit code $EXIT_CODE"
              echo "STEP2_FAILED=true" >> $GITHUB_ENV
              break
            else
              echo "Step2 finished successfully"
              break
            fi

            if [ $RUN_COUNT -gt 50 ]; then
              echo "Too many runs, stopping"
              break
            fi
          done
          touch dcd_step2_done
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Dongchedi step2 complete - $(date +%H:%M)"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Auto-fix step2 error
        if: env.STEP2_FAILED == 'true'
        run: |
          echo "尝试自动修复 step2 错误 (使用新版通用修复器)..."
          python auto_fix_workflow.py step2_error.log crawl_dongchedi.py || echo "自动修复失败，继续运行"

      - name: Retry step2 after fix
        if: env.STEP2_FAILED == 'true'
        run: |
          echo "修复后重试 step2..."
          rm -f step2_error.log
          if [ -f proxies.json ]; then
            export http_proxy=http://127.0.0.1:7890
            export https_proxy=http://127.0.0.1:7890
          fi
          python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }}

  dongchedi-step3-4:
    needs: [dongchedi-step2]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: actions/setup-python@main
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@master
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@master
      - run: pip install requests beautifulsoup4 selenium lxml PyYAML

      - name: Setup environment
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> $GITHUB_ENV
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> $GITHUB_ENV
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "ACTION_PAT=${{ secrets.ACTION_PAT }}" >> $GITHUB_ENV

      - name: Run step3 and step4
        run: |
          python crawl_dongchedi.py --step 3
          python crawl_dongchedi.py --step 4

      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@main
        with:
          name: dongchedi-data-${{ env.CRAWL_DATE }}
          path: |
            dongchedi_*.json
          retention-days: 90
