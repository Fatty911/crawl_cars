name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    name: Python and static site checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile scripts/crawl_dongchedi.py scripts/crawl_zero_to_whole_ratio.py scripts/merge_data.py scripts/proxy_manager.py scripts/run_with_proxy.py scripts/test_autohome.py scripts/*.py

      - name: Validate changed workflow and site files
        run: >
          python scripts/validate_syntax.py
          "$PWD/.github/workflows/AI_Auto_Fix_Monitor.yml"
          "$PWD/.github/workflows/ci.yml"
          "$PWD/.github/workflows/auto-merge.yml"
          "$PWD/.github/workflows/crawl-autohome.yml"
          "$PWD/.github/workflows/crawl-dongchedi.yml"
          "$PWD/.github/workflows/deploy-pages.yml"
          "$PWD/.github/workflows/merge-and-filter.yml"
          "$PWD/scripts/check_workflow_expectations.py"
          "$PWD/scripts/configure_cron_job_org.py"
          "$PWD/scripts/crawl_budget.py"
          "$PWD/scripts/ensure_codex_autofix_scope.py"
          "$PWD/scripts/validate_workflow_expectations.py"
          "$PWD/scripts/crawl_zero_to_whole_ratio.py"
          "$PWD/scripts/merge_data.py"
          "$PWD/docs/index.html"
          "$PWD/docs/styles.css"
          "$PWD/docs/app.js"
          "$PWD/docs/config.js"
          "$PWD/docs/filter_conditions.json"
          "$PWD/config/filter_conditions.json"

      - name: Validate workflow expectations
        run: python scripts/validate_workflow_expectations.py

      - name: Smoke test scripts/merge_data.py
        run: |
          python - <<'PY'
          import json

          match_row = {
              "品牌": "测试品牌",
              "车系": "测试车系",
              "车系ID": "ci",
              "车型名称": "CI测试车型",
              "年款": "2026",
              "官方0-100km_h加速_s_": "6.8",
              "CLTC纯电续航里程_km_": "200",
              "城市领航辅助": "●",
              "远程启动功能": "●",
              "手机APP远程功能": "车门控制|空调控制|车辆启动",
              "钥匙类型": "遥控钥匙|蓝牙钥匙",
              "电动座椅记忆功能": "驾驶位",
              "外后视镜功能": "电动调节|记忆|加热"
          }
          low_range_row = dict(match_row, 车型名称="CI低续航车型", CLTC纯电续航里程_km_="100")

          with open("autoHome_ci_smoke.json", "w", encoding="utf-8") as f:
              json.dump([match_row, low_range_row], f, ensure_ascii=False)

          with open("dongchedi_ci_smoke.json", "w", encoding="utf-8") as f:
              json.dump([match_row, low_range_row], f, ensure_ascii=False)

          zero_ratio_rows = [
              {
                  "数据来源": "CI零整比来源",
                  "发布日期": "2026-06",
                  "品牌": "测试品牌",
                  "车系": "测试车系",
                  "车型名称": "2026 测试品牌 测试车系 CI测试车型",
                  "零整比": 320.5
              },
              {
                  "数据来源": "CI零整比来源B",
                  "发布日期": "2026-06",
                  "品牌": "测试品牌",
                  "车系": "测试车系",
                  "车型名称": "2026 测试品牌 测试车系 CI测试车型",
                  "零整比": 340.5
              }
          ]
          with open("zero_to_whole_ratios_ci_smoke.json", "w", encoding="utf-8") as f:
              json.dump(zero_ratio_rows, f, ensure_ascii=False)
          PY

          python scripts/merge_data.py

          test -s "merged_$(date +%Y%m%d).json"
          test -s "merged_$(date +%Y%m%d).csv"
          test -s "filtered_cars_$(date +%Y%m%d).json"
          test -s "filtered_cars_$(date +%Y%m%d).csv"

          python - <<'PY'
          import json
          from datetime import date

          today = f"{date.today():%Y%m%d}"
          with open(f"merged_{today}.json", "r", encoding="utf-8") as f:
              merged_rows = json.load(f)
          with open(f"filtered_cars_{today}.json", "r", encoding="utf-8") as f:
              filtered_rows = json.load(f)

          if len(merged_rows) != 2:
              raise SystemExit(f"expected 2 merged rows (deduplicated), got {len(merged_rows)}")
          if len(filtered_rows) != 1:
              raise SystemExit(f"expected 1 filtered row (low range excluded), got {len(filtered_rows)}")
          ratios = [row.get("零整比") for row in filtered_rows if row.get("车型名称") == "CI测试车型"]
          if ratios != ["330.50%"]:
              raise SystemExit(f"expected averaged zero-to-whole ratio, got {ratios}")
          PY
