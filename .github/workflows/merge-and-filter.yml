# 多 job：合并与发版分离；合并成功但 Release 失败时，可只重跑 release。
name: 合并分析
on:
  schedule:
    - cron: '0 3 * * 3'
    - cron: '0 3 * * 6'
  workflow_dispatch:
    inputs:
      force_merge:
        description: '强制重新合并'
        required: false
        default: 'false'

jobs:
  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 强制重新合并
        if: github.event.inputs.force_merge == 'true'
        run: |
          echo "强制重新合并，清理旧数据文件..."
          rm -f autoHome_*.json dongchedi_*.json merged_*.csv diff_*.csv filtered_cars_*.csv filtered_cars_*.json

      - name: 合并数据文件
        run: |
          echo "当前目录数据文件:"
          ls -la *.json *.csv 2>/dev/null || echo "没有找到数据文件"

          if ls autoHome_*.json dongchedi_*.json 2>/dev/null; then
            echo "找到数据文件，开始合并..."
            python merge_data.py
          else
            echo "没有找到数据文件，跳过合并"
            exit 0
          fi

      - name: 设置日期变量
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: 检查合并结果
        run: |
          if [ -f "filtered_cars_${{ steps.date.outputs.date }}.json" ]; then
            echo "合并成功，生成文件:"
            ls -la filtered_cars_*
          else
            echo "合并失败，未生成输出文件"
            exit 1
          fi

      - name: 上传合并产物
        uses: actions/upload-artifact@v4
        with:
          name: filtered-cars-${{ steps.date.outputs.date }}
          path: |
            filtered_cars_${{ steps.date.outputs.date }}.csv
            filtered_cars_${{ steps.date.outputs.date }}.json
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [merge-data]
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载合并产物
        uses: actions/download-artifact@v4
        with:
          name: filtered-cars-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files

      - name: 创建发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.merge-data.outputs.crawl_date }}
          name: 车型数据 ${{ needs.merge-data.outputs.crawl_date }}
          files: |
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.json
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
