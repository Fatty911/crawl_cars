# 多 job：合并与发版分离；合并成功但 Release 失败时，可只重跑 release。
name: 合并分析
on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      force_merge:
        description: '强制重新合并'
        required: false
        default: 'false'

jobs:
  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 强制重新合并
        if: github.event.inputs.force_merge == 'true'
        run: |
          echo "强制重新合并，清理旧数据文件..."
          rm -f autoHome_*.json dongchedi_*.json merged_*.csv diff_*.csv filtered_cars_*.csv filtered_cars_*.json

      - name: 下载最新爬虫数据
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "尝试下载最新的爬虫数据 artifact..."

          # 获取最近的汽车之家爬虫 artifact
          AUTORUN=$(gh run list --repo ${{ github.repository }} --workflow crawl-autohome.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$AUTORUN" ]; then
            echo "找到汽车之家成功运行: $AUTORUN"
            gh run download "$AUTORUN" --repo ${{ github.repository }} --pattern "autohome-data-*" --dir . 2>/dev/null || echo "下载汽车之家 artifact 失败"
            # 移动文件到当前目录
            mv autohome-data-*/*.json . 2>/dev/null || true
            rm -rf autohome-data-* 2>/dev/null || true
          else
            echo "未找到成功的汽车之家爬虫运行"
          fi

          # 获取最近的懂车帝爬虫 artifact
          DCDRUN=$(gh run list --repo ${{ github.repository }} --workflow crawl-dongchedi.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$DCDRUN" ]; then
            echo "找到懂车帝成功运行: $DCDRUN"
            gh run download "$DCDRUN" --repo ${{ github.repository }} --pattern "dongchedi-data-*" --dir . 2>/dev/null || echo "下载懂车帝 artifact 失败"
            # 移动文件到当前目录
            mv dongchedi-data-*/*.json . 2>/dev/null || true
            rm -rf dongchedi-data-* 2>/dev/null || true
          else
            echo "未找到成功的懂车帝爬虫运行"
          fi

          echo "当前目录数据文件:"
          ls -la *.json 2>/dev/null || echo "没有找到数据文件"

      - name: 合并数据文件
        run: |
          if ls autoHome_*.json dongchedi_*.json 2>/dev/null; then
            echo "找到数据文件，开始合并..."
            python merge_data.py
          else
            echo "没有找到数据文件，跳过合并"
            exit 0
          fi

      - name: 设置日期变量
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: 检查合并结果
        run: |
          if [ -s "merged_${{ steps.date.outputs.date }}.csv" ] && [ -s "merged_${{ steps.date.outputs.date }}.json" ] && [ -f "filtered_cars_${{ steps.date.outputs.date }}.json" ]; then
            echo "合并成功，生成文件:"
            ls -la merged_* filtered_cars_*
            if [ "$(wc -l < "merged_${{ steps.date.outputs.date }}.csv")" -lt 2 ]; then
              echo "合并 CSV 没有数据行，拒绝发布空文件"
              exit 1
            fi
          else
            echo "合并失败，未生成输出文件"
            exit 1
          fi

      - name: 上传合并产物
        uses: actions/upload-artifact@main
        with:
          name: car-data-${{ steps.date.outputs.date }}
          path: |
            merged_${{ steps.date.outputs.date }}.csv
            merged_${{ steps.date.outputs.date }}.json
            filtered_cars_${{ steps.date.outputs.date }}.csv
            filtered_cars_${{ steps.date.outputs.date }}.json
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [merge-data]
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: car-data-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files

      - name: 创建发布
        uses: softprops/action-gh-release@master
        with:
          tag_name: v${{ needs.merge-data.outputs.crawl_date }}
          name: 车型数据 ${{ needs.merge-data.outputs.crawl_date }}
          files: |
            release-files/merged_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/merged_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
