# 多 job：合并与发版分离；合并成功但 Release 失败时，可只重跑 release。
name: 合并分析
on:
  schedule:
    # UTC 12:30 = 北京时间 20:30，等待下午爬虫窗口结束后再合并
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      force_merge:
        description: '强制重新合并'
        required: false
        default: 'false'
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
      trigger_time:
        description: '触发时间戳'
        required: false
        default: ''

concurrency:
  group: merge-and-filter
  cancel-in-progress: false

jobs:
  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
      ready: ${{ steps.validate.outputs.ready }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 安装合并依赖
        run: pip install requests beautifulsoup4 lxml pdfplumber pypdf

      - name: 强制重新合并
        if: github.event.inputs.force_merge == 'true'
        run: |
          echo "强制重新合并，清理旧数据文件..."
          rm -f autoHome_*.json dongchedi_*.json merged_*.csv diff_*.csv filtered_cars_*.csv filtered_cars_*.json

      - name: 下载最新爬虫数据
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "尝试下载最新的爬虫数据 artifact..."

          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            MIN_ARTIFACT_DATE="${CN_MONTH}01"
          else
            MIN_ARTIFACT_DATE="${CN_MONTH}16"
          fi
          echo "只接受当前半月内 artifact，最早日期: $MIN_ARTIFACT_DATE"

          python custom_scripts/download_latest_crawler_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow crawl-autohome.yml \
            --artifact-prefix autohome-data- \
            --json-pattern "autoHome_*.json" \
            --label "汽车之家" \
            --min-date "$MIN_ARTIFACT_DATE" \
            --min-rows 50

          python custom_scripts/download_latest_crawler_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow crawl-dongchedi.yml \
            --artifact-prefix dongchedi-data- \
            --json-pattern "dongchedi_*.json" \
            --label "懂车帝" \
            --min-date "$MIN_ARTIFACT_DATE" \
            --min-rows 50

          echo "当前目录数据文件:"
          ls -la *.json 2>/dev/null || echo "没有找到数据文件"

      - name: 校验爬虫数据完整性
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_MERGE: ${{ github.event.inputs.force_merge }}
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          checks = [
              ("汽车之家", "autoHome_*.json"),
              ("懂车帝", "dongchedi_*.json"),
          ]
          ok = True
          for label, pattern in checks:
              files = sorted(glob.glob(pattern))
              if not files:
                  print(f"{label} 未找到 {pattern} 数据文件")
                  ok = False
                  continue
              path = files[-1]
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      rows = json.load(f)
              except Exception as exc:
                  print(f"{label} 数据文件 {path} 读取失败: {exc}")
                  ok = False
                  continue
              count = len(rows) if isinstance(rows, list) else 0
              print(f"{label} 数据文件: {path}, 行数: {count}")
              if count < 50:
                  print(f"{label} 数据少于 50 行，疑似爬虫数据不完整，拒绝合并")
                  ok = False
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ready={'true' if ok else 'false'}\n")
          if not ok:
              print("爬虫数据尚未完整，本次合并成功跳过，不发布不完整数据")
              if os.environ.get("EVENT_NAME") == "workflow_dispatch" and os.environ.get("FORCE_MERGE") == "true":
                  print("手动强制合并要求数据必须完整，按失败处理")
                  sys.exit(1)
              sys.exit(0)
          PY

      - name: 爬取零整比数据
        if: steps.validate.outputs.ready == 'true'
        run: python crawl_zero_to_whole_ratio.py
        env:
          ZERO_TO_WHOLE_RATIO_URLS: ${{ vars.ZERO_TO_WHOLE_RATIO_URLS }}

      - name: 合并数据文件
        if: steps.validate.outputs.ready == 'true'
        run: |
          if ls autoHome_*.json dongchedi_*.json 2>/dev/null; then
            echo "找到数据文件，开始合并..."
            python merge_data.py
          else
            echo "没有找到数据文件，跳过合并"
            exit 0
          fi

      - name: 设置日期变量
        id: date
        if: steps.validate.outputs.ready == 'true'
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: 检查合并结果
        if: steps.validate.outputs.ready == 'true'
        run: |
          if [ -s "merged_${{ steps.date.outputs.date }}.csv" ] && [ -s "merged_${{ steps.date.outputs.date }}.json" ] && [ -f "filtered_cars_${{ steps.date.outputs.date }}.json" ]; then
            echo "合并成功，生成文件:"
            ls -la merged_* filtered_cars_*
            ROWS=$(python -c 'import json; print(len(json.load(open("merged_${{ steps.date.outputs.date }}.json", encoding="utf-8"))))')
            echo "合并数据行数: $ROWS"
            if [ "$ROWS" -lt 50 ]; then
              echo "合并数据少于 50 行，疑似爬虫数据不完整，拒绝发布"
              exit 1
            fi
          else
            echo "合并失败，未生成输出文件"
            exit 1
          fi

      - name: 上传合并产物
        if: steps.validate.outputs.ready == 'true'
        uses: actions/upload-artifact@main
        with:
          name: car-data-${{ steps.date.outputs.date }}
          path: |
            merged_${{ steps.date.outputs.date }}.csv
            merged_${{ steps.date.outputs.date }}.json
            filtered_cars_${{ steps.date.outputs.date }}.csv
            filtered_cars_${{ steps.date.outputs.date }}.json
            zero_to_whole_ratios_${{ steps.date.outputs.date }}.json
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [merge-data]
    if: needs.merge-data.outputs.ready == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: car-data-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files

      - name: 创建发布
        uses: softprops/action-gh-release@master
        with:
          tag_name: v${{ needs.merge-data.outputs.crawl_date }}
          name: 车型数据 ${{ needs.merge-data.outputs.crawl_date }}
          files: |
            release-files/merged_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/merged_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/zero_to_whole_ratios_${{ needs.merge-data.outputs.crawl_date }}.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy-pages workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.ACTION_PAT }}
        run: |
          echo "Release 创建完成，触发部署 Pages 工作流..."
          gh workflow run deploy-pages.yml \
            --repo ${{ github.repository }} \
            -f trigger_source=merge-and-filter \
            -f trigger_time=$(date +%s)
