# 多 job：合并与发版分离；合并成功但 Release 失败时，可只重跑 release。
name: 合并分析
on:
  workflow_dispatch:
    inputs:
      force_merge:
        description: '强制重新合并'
        required: false
        default: 'false'
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
      trigger_time:
        description: '触发时间戳'
        required: false
        default: ''
      debug_mode:
        description: '是否合并指定爬虫 run 的 debug artifact'
        required: false
        default: 'false'
      crawler_run_id:
        description: 'debug 爬虫 workflow run ID'
        required: false
        default: ''
      crawler_run_attempt:
        description: 'debug 爬虫 workflow run attempt'
        required: false
        default: ''

concurrency:
  group: merge-and-filter
  cancel-in-progress: false

jobs:
  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
      ready: ${{ steps.validate.outputs.ready }}
      crawl_time: ${{ steps.date.outputs.time }}
      release_tag: ${{ steps.date.outputs.release_tag }}
      debug_mode: ${{ github.event.inputs.debug_mode || 'false' }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 安装合并依赖
        run: pip install requests beautifulsoup4 lxml pdfplumber pypdf

      - name: 强制重新合并
        if: github.event.inputs.force_merge == 'true'
        run: |
          echo "强制重新合并，清理旧数据文件..."
          rm -f autoHome_*.json dongchedi_*.json merged_*.csv diff_*.csv filtered_cars_*.csv filtered_cars_*.json

      - name: 下载最新爬虫数据
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
          CRAWLER_RUN_ID: ${{ github.event.inputs.crawler_run_id }}
          CRAWLER_RUN_ATTEMPT: ${{ github.event.inputs.crawler_run_attempt }}
          TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source }}
        run: |
          set -euo pipefail
          echo "尝试下载最新的爬虫数据 artifact..."
          rm -rf merge-inputs
          mkdir -p merge-inputs/stable/autohome merge-inputs/stable/dongchedi merge-inputs/stable/yiche

          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            MIN_ARTIFACT_DATE="${CN_MONTH}01"
          else
            MIN_ARTIFACT_DATE="${CN_MONTH}16"
          fi
          AUTOHOME_STABLE_MIN_DATE_ARGS=(--min-date "$MIN_ARTIFACT_DATE")
          DONGCHEDI_STABLE_MIN_DATE_ARGS=(--min-date "$MIN_ARTIFACT_DATE")
          PARTIAL_SOURCE=''
          PARTIAL_ARTIFACT_ID=''
          PARTIAL_ARTIFACT_NAME=''
          if [ "$DEBUG_MODE" = "true" ]; then
            AUTOHOME_STABLE_MIN_DATE_ARGS=()
            DONGCHEDI_STABLE_MIN_DATE_ARGS=()
            echo "debug 模式允许 stable-first 基线回退到最近可用的历史 stable artifact"
          else
            echo "只接受当前半月内 artifact，最早日期: $MIN_ARTIFACT_DATE"
            case "$TRIGGER_SOURCE" in
              autohome-crawl)
                PARTIAL_SOURCE=autohome
                PARTIAL_WORKFLOW='.github/workflows/crawl-autohome.yml'
                PARTIAL_REGEX='^autohome-partial-data-[0-9]{8}$'
                PARTIAL_JSON_PATTERN='autoHome_*.json'
                PARTIAL_STABLE_OUTPUT='autoHome_partial_prepared.json'
                PARTIAL_TARGET='autoHome_stable.json'
                ;;
              dongchedi-crawl)
                PARTIAL_SOURCE=dongchedi
                PARTIAL_WORKFLOW='.github/workflows/crawl-dongchedi.yml'
                PARTIAL_REGEX='^dongchedi-partial-data-[0-9]{8}$'
                PARTIAL_JSON_PATTERN='dongchedi_*.json'
                PARTIAL_STABLE_OUTPUT='dongchedi_partial_prepared.json'
                PARTIAL_TARGET='dongchedi_stable.json'
                ;;
            esac
            if [ -n "$PARTIAL_SOURCE" ]; then
              if ! [[ "$CRAWLER_RUN_ID" =~ ^[0-9]+$ && "$CRAWLER_RUN_ATTEMPT" =~ ^[0-9]+$ ]]; then
                echo "partial 合并必须提供纯数字 crawler_run_id/crawler_run_attempt"
                exit 1
              fi
              IFS=$'\t' read -r RUN_ATTEMPT RUN_PATH RUN_STATUS RUN_CONCLUSION RUN_STARTED_AT RUN_UPDATED_AT < <(
                gh api "repos/${{ github.repository }}/actions/runs/$CRAWLER_RUN_ID/attempts/$CRAWLER_RUN_ATTEMPT" \
                  --jq '[.run_attempt, .path, .status, .conclusion, .run_started_at, .updated_at] | @tsv'
              )
              RUN_PATH="${RUN_PATH%%@*}"
              if [ "$RUN_ATTEMPT" != "$CRAWLER_RUN_ATTEMPT" ] \
                || [ "$RUN_PATH" != "$PARTIAL_WORKFLOW" ] \
                || [ "$RUN_STATUS" != "completed" ] \
                || [ "$RUN_CONCLUSION" != "success" ]; then
                echo "指定 run/attempt/source 不是已成功完成的 partial workflow"
                exit 1
              fi
              mapfile -t PARTIAL_ARTIFACTS < <(
                gh api "repos/${{ github.repository }}/actions/runs/$CRAWLER_RUN_ID/artifacts?per_page=100" \
                  --jq '.artifacts[] | select(.expired == false) | [.id, .name, .created_at] | @tsv' |
                  while IFS=$'\t' read -r ARTIFACT_ID ARTIFACT_NAME ARTIFACT_CREATED_AT; do
                    if [[ "$ARTIFACT_NAME" =~ $PARTIAL_REGEX ]]; then
                      ARTIFACT_DATE="${ARTIFACT_NAME##*-}"
                      if [[ "$ARTIFACT_DATE" < "$MIN_ARTIFACT_DATE" ]]; then
                        continue
                      fi
                      if [[ "$ARTIFACT_CREATED_AT" < "$RUN_STARTED_AT" ]]; then
                        continue
                      fi
                      if [[ "$ARTIFACT_CREATED_AT" > "$RUN_UPDATED_AT" ]]; then
                        continue
                      fi
                      printf '%s\t%s\t%s\n' "$ARTIFACT_ID" "$ARTIFACT_NAME" "$ARTIFACT_CREATED_AT"
                    fi
                  done
              )
              if [ "${#PARTIAL_ARTIFACTS[@]}" -gt 1 ]; then
                echo "指定 $PARTIAL_SOURCE run 的当前 attempt partial artifact 不唯一"
                exit 1
              elif [ "${#PARTIAL_ARTIFACTS[@]}" -eq 1 ]; then
                IFS=$'\t' read -r PARTIAL_ARTIFACT_ID PARTIAL_ARTIFACT_NAME _ <<< "${PARTIAL_ARTIFACTS[0]}"
                if [ "$PARTIAL_SOURCE" = "autohome" ]; then
                  AUTOHOME_STABLE_MIN_DATE_ARGS=()
                else
                  DONGCHEDI_STABLE_MIN_DATE_ARGS=()
                fi
                echo "$PARTIAL_SOURCE 使用当前 attempt partial artifact $PARTIAL_ARTIFACT_NAME，允许对应 stable 基线回退"
              fi
            fi
          fi

          python scripts/download_latest_crawler_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow crawl-autohome.yml \
            --artifact-prefix autohome-data- \
            --json-pattern "autoHome_*.json" \
            --label "汽车之家" \
            --output-dir merge-inputs/stable/autohome \
            "${AUTOHOME_STABLE_MIN_DATE_ARGS[@]}" \
            --min-rows 50

          python scripts/download_latest_crawler_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow crawl-dongchedi.yml \
            --artifact-prefix dongchedi-data- \
            --json-pattern "dongchedi_*.json" \
            --label "懂车帝" \
            --output-dir merge-inputs/stable/dongchedi \
            "${DONGCHEDI_STABLE_MIN_DATE_ARGS[@]}" \
            --min-rows 50

          python scripts/download_latest_crawler_artifact.py \
            --repo "${{ github.repository }}" \
            --workflow crawl-yiche.yml \
            --artifact-prefix yiche-data- \
            --json-pattern "yiche_*.json" \
            --label "易车" \
            --output-dir merge-inputs/stable/yiche \
            --min-bytes 1 \
            --min-rows 1 || true

          mapfile -t AUTOHOME_STABLE < <(find merge-inputs/stable/autohome -maxdepth 1 -type f -name 'autoHome_*.json' -print)
          mapfile -t DONGCHEDI_STABLE < <(find merge-inputs/stable/dongchedi -maxdepth 1 -type f -name 'dongchedi_*.json' -print)
          mapfile -t YICHE_STABLE < <(find merge-inputs/stable/yiche -maxdepth 1 -type f -name 'yiche_*.json' -print)
          if [ "${#AUTOHOME_STABLE[@]}" -ne 1 ] || [ "${#DONGCHEDI_STABLE[@]}" -ne 1 ]; then
            echo "当前半月 stable artifact 不齐备，改用 Pages 已发布精确单源行作为缺失 stable 基线"
            curl --fail --show-error --silent --location --retry 4 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 180 \
              https://cars.jiucai.eu.org/data/latest.json \
              --output merge-inputs/current-pages-latest.json
            if [ "${#AUTOHOME_STABLE[@]}" -ne 1 ]; then
              python scripts/filter_pages_source_baseline.py --input merge-inputs/current-pages-latest.json --output merge-inputs/stable/autohome/autoHome_pages_baseline.json --source autohome --min-rows 50
              mapfile -t AUTOHOME_STABLE < <(find merge-inputs/stable/autohome -maxdepth 1 -type f -name 'autoHome_*.json' -print)
            fi
            if [ "${#DONGCHEDI_STABLE[@]}" -ne 1 ]; then
              python scripts/filter_pages_source_baseline.py --input merge-inputs/current-pages-latest.json --output merge-inputs/stable/dongchedi/dongchedi_pages_baseline.json --source dongchedi --min-rows 50
              mapfile -t DONGCHEDI_STABLE < <(find merge-inputs/stable/dongchedi -maxdepth 1 -type f -name 'dongchedi_*.json' -print)
            fi
          fi
          if [ "${#AUTOHOME_STABLE[@]}" -ne 1 ] || [ "${#DONGCHEDI_STABLE[@]}" -ne 1 ]; then
            echo "爬虫 stable artifact 尚未齐备，交由完整性校验安全跳过"
            exit 0
          fi

          if [ "$DEBUG_MODE" = "true" ]; then
            if ! [[ "$CRAWLER_RUN_ID" =~ ^[0-9]+$ && "$CRAWLER_RUN_ATTEMPT" =~ ^[0-9]+$ ]]; then
              echo "debug 模式必须提供纯数字 crawler_run_id/crawler_run_attempt"
              exit 1
            fi
            case "$TRIGGER_SOURCE" in
              autohome-crawl)
                SOURCE_DIR=autohome
                ARTIFACT_PREFIX=autohome-debug-data
                JSON_PATTERN='autoHome_*.json'
                EXPECTED_WORKFLOW='.github/workflows/crawl-autohome.yml'
                ;;
              dongchedi-crawl)
                SOURCE_DIR=dongchedi
                ARTIFACT_PREFIX=dongchedi-debug-data
                JSON_PATTERN='dongchedi_*.json'
                EXPECTED_WORKFLOW='.github/workflows/crawl-dongchedi.yml'
                ;;
              yiche-crawl)
                SOURCE_DIR=yiche
                ARTIFACT_PREFIX=yiche-data
                JSON_PATTERN='yiche_*.json'
                EXPECTED_WORKFLOW='.github/workflows/crawl-yiche.yml'
                ;;
              *)
                echo "debug trigger_source 必须是 autohome-crawl、dongchedi-crawl 或 yiche-crawl"
                exit 1
                ;;
            esac

            RUN_ATTEMPT=$(gh api "repos/${{ github.repository }}/actions/runs/$CRAWLER_RUN_ID" --jq '.run_attempt')
            RUN_PATH=$(gh api "repos/${{ github.repository }}/actions/runs/$CRAWLER_RUN_ID" --jq '.path')
            RUN_PATH="${RUN_PATH%%@*}"
            if [ "$RUN_ATTEMPT" != "$CRAWLER_RUN_ATTEMPT" ] || [ "$RUN_PATH" != "$EXPECTED_WORKFLOW" ]; then
              echo "指定 run/attempt/source 与爬虫 workflow 不匹配"
              exit 1
            fi

            if [ "$SOURCE_DIR" = "yiche" ]; then
              ARTIFACT_REGEX="^${ARTIFACT_PREFIX}-${CRAWLER_RUN_ID}-${CRAWLER_RUN_ATTEMPT}$"
            else
              ARTIFACT_REGEX="^${ARTIFACT_PREFIX}-[0-9]{8}-${CRAWLER_RUN_ID}-${CRAWLER_RUN_ATTEMPT}$"
            fi
            mapfile -t DEBUG_ARTIFACTS < <(
              gh api "repos/${{ github.repository }}/actions/runs/$CRAWLER_RUN_ID/artifacts?per_page=100" --jq '.artifacts[] | select(.expired == false) | .name' \
                | grep -E "$ARTIFACT_REGEX" || true
            )
            if [ "${#DEBUG_ARTIFACTS[@]}" -ne 1 ]; then
              echo "指定 run/attempt/source 的 debug artifact 必须精确存在一份"
              exit 1
            fi

            mkdir -p "merge-inputs/debug/$SOURCE_DIR"
            gh run download "$CRAWLER_RUN_ID" \
              --repo "${{ github.repository }}" \
              --name "${DEBUG_ARTIFACTS[0]}" \
              --dir "merge-inputs/debug/$SOURCE_DIR"
            mapfile -t DEBUG_JSON < <(find "merge-inputs/debug/$SOURCE_DIR" -type f -name "$JSON_PATTERN" -print)
            if [ "${#DEBUG_JSON[@]}" -ne 1 ]; then
              echo "debug artifact 内必须精确包含一份 $JSON_PATTERN"
              exit 1
            fi

            if [ "$SOURCE_DIR" = "autohome" ]; then
              python scripts/prepare_debug_merge_inputs.py \
                --stable "${AUTOHOME_STABLE[0]}" --debug "${DEBUG_JSON[0]}" --output autoHome_debug_prepared.json
              cp "${DONGCHEDI_STABLE[0]}" dongchedi_stable.json
            elif [ "$SOURCE_DIR" = "dongchedi" ]; then
              cp "${AUTOHOME_STABLE[0]}" autoHome_stable.json
              python scripts/prepare_debug_merge_inputs.py \
                --stable "${DONGCHEDI_STABLE[0]}" --debug "${DEBUG_JSON[0]}" --output dongchedi_debug_prepared.json
            else
              cp "${AUTOHOME_STABLE[0]}" autoHome_stable.json
              cp "${DONGCHEDI_STABLE[0]}" dongchedi_stable.json
              cp "${DEBUG_JSON[0]}" yiche_stable.json
            fi
          else
            cp "${AUTOHOME_STABLE[0]}" autoHome_stable.json
            cp "${DONGCHEDI_STABLE[0]}" dongchedi_stable.json
            if [ "${#YICHE_STABLE[@]}" -ge 1 ]; then
              cp "${YICHE_STABLE[0]}" yiche_stable.json
            fi
            if [ -n "$PARTIAL_ARTIFACT_NAME" ]; then
              mkdir -p "merge-inputs/incremental/$PARTIAL_SOURCE"
              echo "下载已确认的 partial artifact $PARTIAL_ARTIFACT_ID/$PARTIAL_ARTIFACT_NAME"
              PARTIAL_ARCHIVE="merge-inputs/incremental/$PARTIAL_SOURCE/artifact.zip"
              gh api "repos/${{ github.repository }}/actions/artifacts/$PARTIAL_ARTIFACT_ID/zip" > "$PARTIAL_ARCHIVE"
              unzip -q "$PARTIAL_ARCHIVE" -d "merge-inputs/incremental/$PARTIAL_SOURCE"
              rm -f "$PARTIAL_ARCHIVE"
              mapfile -t PARTIAL_JSON < <(find "merge-inputs/incremental/$PARTIAL_SOURCE" -type f -name "$PARTIAL_JSON_PATTERN" -print)
              if [ "${#PARTIAL_JSON[@]}" -ne 1 ]; then
                echo "partial artifact 内必须精确包含一份 $PARTIAL_JSON_PATTERN"
                exit 1
              fi
              if [ "$PARTIAL_SOURCE" = "autohome" ]; then
                PARTIAL_STABLE="${AUTOHOME_STABLE[0]}"
              else
                PARTIAL_STABLE="${DONGCHEDI_STABLE[0]}"
              fi
              python scripts/prepare_debug_merge_inputs.py \
                --stable "$PARTIAL_STABLE" --debug "${PARTIAL_JSON[0]}" --output "$PARTIAL_STABLE_OUTPUT"
              mv "$PARTIAL_STABLE_OUTPUT" "$PARTIAL_TARGET"
            fi
          fi

          echo "规范化后的合并输入:"
          ls -la autoHome_*.json dongchedi_*.json yiche_*.json 2>/dev/null || true

      - name: 校验爬虫数据完整性
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_MERGE: ${{ github.event.inputs.force_merge }}
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          checks = [
              ("汽车之家", "autoHome_*.json"),
              ("懂车帝", "dongchedi_*.json"),
          ]
          ok = True
          for label, pattern in checks:
              files = sorted(glob.glob(pattern))
              if not files:
                  print(f"{label} 未找到 {pattern} 数据文件")
                  ok = False
                  continue
              path = files[-1]
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      rows = json.load(f)
              except Exception as exc:
                  print(f"{label} 数据文件 {path} 读取失败: {exc}")
                  ok = False
                  continue
              count = len(rows) if isinstance(rows, list) else 0
              print(f"{label} 数据文件: {path}, 行数: {count}")
              if count < 50:
                  print(f"{label} 数据少于 50 行，疑似爬虫数据不完整，拒绝合并")
                  ok = False
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ready={'true' if ok else 'false'}\n")
          if not ok:
              print("爬虫数据尚未完整，本次合并成功跳过，不发布不完整数据")
              if os.environ.get("EVENT_NAME") == "workflow_dispatch" and os.environ.get("FORCE_MERGE") == "true":
                  print("手动强制合并要求数据必须完整，按失败处理")
                  sys.exit(1)
              sys.exit(0)
          PY

      - name: 爬取零整比数据
        if: steps.validate.outputs.ready == 'true'
        run: python scripts/crawl_zero_to_whole_ratio.py
        env:
          ZERO_TO_WHOLE_RATIO_URLS: ${{ vars.ZERO_TO_WHOLE_RATIO_URLS }}

      - name: 设置日期变量
        id: date
        if: steps.validate.outputs.ready == 'true'
        run: |
          CRAWL_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)
          CRAWL_TIME=$(TZ=Asia/Shanghai date +%H%M)
          echo "date=$CRAWL_DATE" >> "$GITHUB_OUTPUT"
          echo "time=$CRAWL_TIME" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${CRAWL_DATE}-${CRAWL_TIME}-${{ github.run_id }}-a${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: 合并数据文件
        if: steps.validate.outputs.ready == 'true'
        env:
          MERGE_DATE: ${{ steps.date.outputs.date }}
        run: |
          if ls autoHome_*.json dongchedi_*.json 2>/dev/null; then
            echo "找到数据文件，开始合并..."
            python scripts/merge_data.py
          else
            echo "没有找到数据文件，跳过合并"
            exit 0
          fi

      - name: 保留当前 Pages 发布基线
        if: steps.validate.outputs.ready == 'true'
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location --retry 4 --retry-all-errors --retry-delay 5 --connect-timeout 20 --max-time 180 \
            https://cars.jiucai.eu.org/data/latest.json \
            --output /tmp/current-pages-latest.json
          python scripts/preserve_publish_baseline.py \
            --baseline /tmp/current-pages-latest.json \
            --merged-json "merged_${{ steps.date.outputs.date }}.json" \
            --merged-csv "merged_${{ steps.date.outputs.date }}.csv" \
            --filtered-json "filtered_cars_${{ steps.date.outputs.date }}.json" \
            --filtered-csv "filtered_cars_${{ steps.date.outputs.date }}.csv"

      - name: 检查合并结果
        if: steps.validate.outputs.ready == 'true'
        run: |
          if [ -s "merged_${{ steps.date.outputs.date }}.csv" ] && [ -s "merged_${{ steps.date.outputs.date }}.json" ] && [ -f "filtered_cars_${{ steps.date.outputs.date }}.json" ]; then
            echo "合并成功，生成文件:"
            ls -la merged_* filtered_cars_*
            ROWS=$(python -c 'import json; print(len(json.load(open("merged_${{ steps.date.outputs.date }}.json", encoding="utf-8"))))')
            echo "合并数据行数: $ROWS"
            if [ "$ROWS" -lt 50 ]; then
              echo "合并数据少于 50 行，疑似爬虫数据不完整，拒绝发布"
              exit 1
            fi
          else
            echo "合并失败，未生成输出文件"
            exit 1
          fi

      - name: 发布防缩小校验
        if: steps.validate.outputs.ready == 'true'
        run: |
          set -euo pipefail
          python scripts/verify_publish_superset.py \
            --baseline /tmp/current-pages-latest.json \
            --candidate "merged_${{ steps.date.outputs.date }}.json"

      - name: 生成合并证据报告
        if: steps.validate.outputs.ready == 'true'
        run: python scripts/analysis/merge_evidence_report.py --input "merged_${{ steps.date.outputs.date }}.json" --output docs/analysis/merge_evidence_report.json

      - name: 上传合并分析报告
        if: steps.validate.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: merge-analysis-${{ steps.date.outputs.date }}
          path: |
            docs/analysis/merge_evidence_report.json
            docs/analysis/merge_stats_${{ steps.date.outputs.date }}.json
          retention-days: 3

      - name: 上传合并产物
        if: steps.validate.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: car-data-${{ steps.date.outputs.date }}-${{ steps.date.outputs.time }}
          path: |
            merged_${{ steps.date.outputs.date }}.csv
            merged_${{ steps.date.outputs.date }}.json
            filtered_cars_${{ steps.date.outputs.date }}.csv
            filtered_cars_${{ steps.date.outputs.date }}.json
            zero_to_whole_ratios_${{ steps.date.outputs.date }}.json
          retention-days: 3

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [merge-data]
    if: needs.merge-data.outputs.ready == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@v4
        with:
          name: car-data-${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          path: release-files

      - name: 创建发布
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{ needs.merge-data.outputs.release_tag }}
          name: 车型数据 ${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          files: |
            release-files/merged_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/merged_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/zero_to_whole_ratios_${{ needs.merge-data.outputs.crawl_date }}.json
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy-pages workflow
        if: success()
        env:
          GH_TOKEN: ${{ secrets.ACTION_PAT }}
        run: |
          echo "Release 创建完成，触发部署 Pages 工作流..."
          gh workflow run deploy-pages.yml \
            --repo ${{ github.repository }} \
            --ref "${{ github.ref_name }}" \
            -f trigger_source=merge-and-filter \
            -f release_tag=${{ needs.merge-data.outputs.release_tag }} \
            -f debug_mode=${{ needs.merge-data.outputs.debug_mode }} \
            -f trigger_time=$(date +%s)
