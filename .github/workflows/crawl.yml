name: Monthly Car Data Crawl
on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'

env:
  RUN_TIME: 7200
  MAX_CARS: 300

jobs:
  crawl-autohome:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml
      
      - name: Restart if requested
        if: github.event.inputs.force_restart == 'true'
        run: rm -f progress.json step1_done
      
      - name: Check if step1 already done
        id: check_done
        run: |
          if [ -f step1_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run step1 loop
        if: steps.check_done.outputs.done != 'true'
        run: |
          while true; do
            python test_autohome.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} --max-cars ${{ env.MAX_CARS }}
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 10 ]; then
              echo "Step1 incomplete, committing progress..."
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add -A
              git diff --staged --quiet || git commit -m "Update progress - $(date +%H:%M)"
              git push
              echo "Re-running step1..."
              git pull
            else
              break
            fi
          done
          touch step1_done
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete - $(date +%H:%M)"
          git push
          
      - name: Run remaining steps
        run: |
          python test_autohome.py --step 2
          python test_autohome.py --step 3
          python test_autohome.py --step 4
          python test_autohome.py --step 5
          python test_autohome.py --step 6
      
      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      
      - uses: actions/upload-artifact@v4
        with:
          name: autohome-data-${{ env.CRAWL_DATE }}
          path: |
            autoHome_*.json
          retention-days: 90

  crawl-dongchedi:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: crawl-autohome
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml
      - run: python crawl_dongchedi.py
      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: dongchedi-data-${{ env.CRAWL_DATE }}
          path: |
            dongchedi_*.json
          retention-days: 90

  merge-and-filter:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    needs: crawl-dongchedi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: autohome-data-*
          path: .
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: dongchedi-data-*
          path: .
          merge-multiple: true
      - run: ls -la
      - run: python merge_data.py
      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.CRAWL_DATE }}
          name: 车型数据 ${{ env.CRAWL_DATE }}
          files: |
            filtered_cars_${{ env.CRAWL_DATE }}.csv
            filtered_cars_${{ env.CRAWL_DATE }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
