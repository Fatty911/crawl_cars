# 多 job：任一步失败可「仅重新运行失败的作业」，不必整单重跑。
# 进度依赖仓库内 step1_done / dcd_step2_done 等文件，各 job 开头会 pull 最新提交。
name: Monthly Car Data Crawl
on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'

env:
  RUN_TIME: 7200
  MAX_CARS: 500

jobs:
  # --- 汽车之家：step1 与 step2–6 分 job ---
  autohome-step1:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Random delay to mimic human behavior
        run: |
          DELAY=$((RANDOM % 480 + 60))
          echo "Waiting $DELAY seconds before starting..."
          sleep $DELAY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml

      - name: Restart if requested
        if: github.event.inputs.force_restart == 'true'
        run: rm -f progress.json step1_done

      - name: Check if step1 already done
        id: check_done
        run: |
          if [ -f step1_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step1 loop
        if: steps.check_done.outputs.done != 'true'
        run: |
          while true; do
            python test_autohome.py --step 1 --auto --time-limit ${{ env.RUN_TIME }} --max-cars ${{ env.MAX_CARS }}
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 10 ]; then
              echo "Step1 incomplete, committing progress..."
              sleep $((RANDOM % 60 + 30))
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add -A
              git diff --staged --quiet || git commit -m "Update progress - $(date +%H:%M)"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              echo "Re-running step1..."
              sleep $((RANDOM % 120 + 60))
              git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            else
              break
            fi
          done
          touch step1_done
          sleep $((RANDOM % 60 + 30))
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Step1 complete - $(date +%H:%M)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

  autohome-step2-6:
    needs: [autohome-step1]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest (step1 may have pushed)
        run: git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml

      - name: Run steps 2–6
        run: |
          python test_autohome.py --step 2
          python test_autohome.py --step 3
          python test_autohome.py --step 4
          python test_autohome.py --step 5
          python test_autohome.py --step 6

      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: autohome-data-${{ env.CRAWL_DATE }}
          path: |
            autoHome_*.json
          retention-days: 90

  # --- 懂车帝：step1 / step2 / step3–4 分 job ---
  dongchedi-step1:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Random delay
        run: |
          DELAY=$((RANDOM % 180 + 60))
          echo "Waiting $DELAY seconds..."
          sleep $DELAY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml

      - name: Check if step2 already done
        id: check_done_dcd
        run: |
          if [ -f dcd_step2_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step1 to get series list
        if: steps.check_done_dcd.outputs.done != 'true'
        run: |
          python crawl_dongchedi.py --step 1 --auto --time-limit ${{ env.RUN_TIME }}
          if [ -f dongchedi/progress.json ]; then
            sleep $((RANDOM % 60 + 30))
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add -A
            git diff --staged --quiet || git commit -m "Dongchedi step1 - series list - $(date +%H:%M)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi

  dongchedi-step2:
    needs: [dongchedi-step1]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml

      - name: Check if step2 already done
        id: check_done_dcd
        run: |
          if [ -f dcd_step2_done ]; then
            echo "done=true" >> $GITHUB_OUTPUT
          else
            echo "done=false" >> $GITHUB_OUTPUT
          fi

      - name: Run step2 loop
        if: steps.check_done_dcd.outputs.done != 'true'
        run: |
          RUN_COUNT=0
          while true; do
            RUN_COUNT=$((RUN_COUNT + 1))
            echo "=== Step2 run #$RUN_COUNT ==="
            python crawl_dongchedi.py --step 2 --auto --time-limit ${{ env.RUN_TIME }} --max-series ${{ env.MAX_CARS }}
            EXIT_CODE=$?
            echo "Exit code: $EXIT_CODE"

            if [ $EXIT_CODE -eq 10 ]; then
              echo "Step2 incomplete, committing progress..."
              sleep $((RANDOM % 60 + 30))
              git config --local user.email "github-actions[bot]@users.noreply.github.com"
              git config --local user.name "github-actions[bot]"
              git add -A
              git diff --staged --quiet || git commit -m "Update dongchedi progress - $(date +%H:%M)"
              git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              echo "Re-running step2..."
              sleep $((RANDOM % 120 + 60))
              git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            else
              echo "Step2 finished with exit code $EXIT_CODE"
              break
            fi

            if [ $RUN_COUNT -gt 50 ]; then
              echo "Too many runs, stopping"
              break
            fi
          done
          touch dcd_step2_done
          sleep $((RANDOM % 60 + 30))
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Dongchedi step2 complete - $(date +%H:%M)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

  dongchedi-step3-4:
    needs: [dongchedi-step2]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest
        run: git pull https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - uses: nanasess/setup-chromedriver@v2
      - run: pip install requests beautifulsoup4 selenium lxml

      - name: Run step3 and step4
        run: |
          python crawl_dongchedi.py --step 3
          python crawl_dongchedi.py --step 4

      - name: Set date
        run: echo "CRAWL_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: dongchedi-data-${{ env.CRAWL_DATE }}
          path: |
            dongchedi_*.json
          retention-days: 90

  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [autohome-step2-6, dongchedi-step3-4]
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          pattern: autohome-data-*
          path: .
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          pattern: dongchedi-data-*
          path: .
          merge-multiple: true
      - run: ls -la
      - run: python merge_data.py
      - name: Set date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
      - name: Verify merge output
        run: |
          D="${{ steps.date.outputs.date }}"
          if [ -f "filtered_cars_${D}.json" ]; then
            ls -la filtered_cars_*
          else
            echo "合并未生成 filtered_cars_${D}.json"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: filtered-cars-${{ steps.date.outputs.date }}
          path: |
            filtered_cars_${{ steps.date.outputs.date }}.csv
            filtered_cars_${{ steps.date.outputs.date }}.json
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [merge-data]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: filtered-cars-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.merge-data.outputs.crawl_date }}
          name: 车型数据 ${{ needs.merge-data.outputs.crawl_date }}
          files: |
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/filtered_cars_${{ needs.merge-data.outputs.crawl_date }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
