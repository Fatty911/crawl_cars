# 爬虫外部触发器 - 通过 repository_dispatch 触发实际爬虫
# 使用 cron-job.org 或外部定时服务调用此 workflow
# 默认触发全部车源，东八区每天 8:00-12:30 或 13:00-22:00 触发
name: 爬虫外部触发器

on:
  # 由外部定时服务（如 cron-job.org）通过 API 触发
  repository_dispatch:
    types: [trigger-crawl]
  # 也可手动触发测试
  workflow_dispatch:
    inputs:
      crawler_type:
        description: '爬虫类型'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - autohome
          - dongchedi

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      crawler: ${{ steps.select.outputs.crawler }}
      run_profile: ${{ steps.select.outputs.run_profile }}
    steps:
      - name: Select crawler and profile
        id: select
        run: |
          CN_HOUR=$(TZ=Asia/Shanghai date +%H)
          CN_MINUTE=$(TZ=Asia/Shanghai date +%M)
          CURRENT_MINUTES=$((10#$CN_HOUR * 60 + 10#$CN_MINUTE))

          echo "当前北京时间: $CN_HOUR:$CN_MINUTE"

          if [ "$CURRENT_MINUTES" -ge $((8 * 60)) ] && [ "$CURRENT_MINUTES" -le $((12 * 60 + 30)) ]; then
            RUN_PROFILE="morning"
          elif [ "$CURRENT_MINUTES" -ge $((13 * 60)) ] && [ "$CURRENT_MINUTES" -le $((22 * 60)) ]; then
            RUN_PROFILE="afternoon"
          else
            echo "当前北京时间 ${CN_HOUR}:${CN_MINUTE} 不在 08:00-12:30 或 13:00-22:00 爬取窗口，跳过触发"
            echo "crawler=skip" >> $GITHUB_OUTPUT
            echo "run_profile=skip" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "运行窗口: $RUN_PROFILE"
          echo "run_profile=$RUN_PROFILE" >> $GITHUB_OUTPUT
          
          # 选择爬虫类型
          if [ "${{ github.event.client_payload.crawler }}" != "" ]; then
            CRAWLER="${{ github.event.client_payload.crawler }}"
          elif [ "${{ inputs.crawler_type }}" != "" ]; then
            CRAWLER="${{ inputs.crawler_type }}"
          else
            CRAWLER="all"
          fi
          
          echo "选择的爬虫: $CRAWLER"
          echo "crawler=$CRAWLER" >> $GITHUB_OUTPUT

      - name: Trigger target workflow
        if: steps.select.outputs.crawler != 'skip'
        env:
          GH_TOKEN: ${{ secrets.ACTION_PAT }}
        run: |
          CRAWLER="${{ steps.select.outputs.crawler }}"
          RUN_PROFILE="${{ steps.select.outputs.run_profile }}"
          TRIGGER_TIME="$(date +%s)"

          trigger_workflow() {
            local workflow="$1"
            echo "触发 $workflow..."
            gh workflow run "$workflow" \
              --repo "${{ github.repository }}" \
              -f trigger_source="cron-job-org" \
              -f trigger_time="$TRIGGER_TIME" \
              -f run_profile="$RUN_PROFILE"
          }

          case $CRAWLER in
            all)
              trigger_workflow "crawl-autohome.yml"
              trigger_workflow "crawl-dongchedi.yml"
              ;;
            autohome)
              trigger_workflow "crawl-autohome.yml"
              ;;
            dongchedi)
              trigger_workflow "crawl-dongchedi.yml"
              ;;
            *)
              echo "未知爬虫类型: $CRAWLER"
              exit 1
              ;;
          esac

          echo "已触发汽车爬虫，trigger_time=$TRIGGER_TIME, run_profile=$RUN_PROFILE"
