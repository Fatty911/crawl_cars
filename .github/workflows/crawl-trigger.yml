# 爬虫随机触发器 - 通过 repository_dispatch 触发实际爬虫
# 使用 cron-job.org 或外部定时服务调用此 workflow
# 随机选择爬虫类型，东八区 9~17 点之间、日期奇数日触发
name: 爬虫随机触发器

on:
  # 由外部定时服务（如 cron-job.org）通过 API 触发
  repository_dispatch:
    types: [trigger-crawl]
  # 也可手动触发测试
  workflow_dispatch:
    inputs:
      crawler_type:
        description: '爬虫类型'
        required: false
        default: 'random'
        type: choice
        options:
          - random
          - autohome
          - dongchedi
      skip_delay:
        description: '跳过随机延迟'
        required: false
        default: 'false'

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      crawler: ${{ steps.select.outputs.crawler }}
      delay: ${{ steps.select.outputs.delay }}
    steps:
      - name: Select crawler and calculate delay
        id: select
        run: |
          # 东八区时间 (UTC+8)
          # GitHub Actions 运行在 UTC 时区，需要转换
          UTC_HOUR=$(date -u +%H)
          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_HOUR=$((UTC_HOUR + 8))
          if [ $CN_HOUR -ge 24 ]; then
            CN_HOUR=$((CN_HOUR - 24))
          fi
          
          echo "当前东八区时间: $CN_HOUR 点 (UTC: $UTC_HOUR)"
          
          # 判断是否在允许的时间范围 (9~17 点)
          if [ $CN_HOUR -lt 9 ] || [ $CN_HOUR -ge 17 ]; then
            echo "当前不在东八区 9~17 点范围内，跳过触发"
            echo "crawler=skip" >> $GITHUB_OUTPUT
            echo "delay=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ $((10#$CN_DAY % 2)) -eq 0 ]; then
            echo "当前东八区日期 $CN_DAY 为偶数日，按每隔一天规则跳过触发"
            echo "crawler=skip" >> $GITHUB_OUTPUT
            echo "delay=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 选择爬虫类型
          if [ "${{ github.event.client_payload.crawler }}" != "" ]; then
            CRAWLER="${{ github.event.client_payload.crawler }}"
          elif [ "${{ inputs.crawler_type }}" != "random" ] && [ "${{ inputs.crawler_type }}" != "" ]; then
            CRAWLER="${{ inputs.crawler_type }}"
          else
            # 随机选择：autohome 或 dongchedi
            RAND=$((RANDOM % 2))
            if [ $RAND -eq 0 ]; then
              CRAWLER="autohome"
            else
              CRAWLER="dongchedi"
            fi
          fi
          
          echo "选择的爬虫: $CRAWLER"
          echo "crawler=$CRAWLER" >> $GITHUB_OUTPUT
          
          # 计算随机延迟 (0~30 分钟，不占用工作流时间)
          if [ "${{ inputs.skip_delay }}" == "true" ]; then
            DELAY=0
          else
            # 延迟范围：0~1800 秒 (0~30 分钟)
            DELAY=$((RANDOM % 1800))
          fi
          
          echo "随机延迟: $DELAY 秒 ($(($DELAY / 60)) 分钟)"
          echo "delay=$DELAY" >> $GITHUB_OUTPUT

      - name: Trigger target workflow
        if: steps.select.outputs.crawler != 'skip'
        env:
          GH_TOKEN: ${{ secrets.ACTION_PAT }}
        run: |
          CRAWLER="${{ steps.select.outputs.crawler }}"
          
          # 根据爬虫类型触发对应 workflow
          case $CRAWLER in
            autohome)
              WORKFLOW="crawl-autohome.yml"
              ;;
            dongchedi)
              WORKFLOW="crawl-dongchedi.yml"
              ;;
            *)
              echo "未知爬虫类型: $CRAWLER"
              exit 1
              ;;
          esac
          
          echo "触发 $WORKFLOW..."
          
          # 使用 gh CLI 触发 workflow
          gh workflow run "$WORKFLOW" \
            --repo "${{ github.repository }}" \
            -f trigger_source="random-trigger" \
            -f trigger_time="$(date +%s)"
          
          echo "✅ 已触发 $WORKFLOW"
