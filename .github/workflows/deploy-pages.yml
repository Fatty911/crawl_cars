name: 部署车型配置网页

on:
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置 Python
        uses: actions/setup-python@main
        with:
          python-version: "3.12"

      - name: 准备静态站点
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf site release-files
          mkdir -p site/data
          cp -R docs/. site/

          FOUND_DATA=false
          for TAG in $(gh release list --repo "${{ github.repository }}" --limit 30 --json tagName --jq '.[].tagName'); do
            rm -rf release-files
            mkdir -p release-files
            gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --dir release-files \
              --pattern 'merged_*.json' \
              --pattern 'filtered_cars_*.json' \
              --pattern 'merged_*.csv' \
              --pattern 'filtered_cars_*.csv' >/dev/null 2>&1 || true

            MERGED_JSON=$(ls release-files/merged_*.json 2>/dev/null | head -n 1 || true)
            if [ -z "$MERGED_JSON" ]; then
              continue
            fi

            ROWS=$(python - "$MERGED_JSON" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              print(len(json.load(f)))
          PY
          )

            if [ "$ROWS" -lt 50 ]; then
              echo "警告：$TAG 的 merged 数据只有 $ROWS 行，网页仍使用这份最近 Release 数据"
            fi

            DATE=$(basename "$MERGED_JSON" | sed -E 's/merged_([0-9]+)\.json/\1/')
            cp "$MERGED_JSON" site/data/latest.json
            cp release-files/filtered_cars_*.json site/data/filtered.json
            cp release-files/merged_*.csv "site/data/merged_${DATE}.csv"
            cp release-files/filtered_cars_*.csv "site/data/filtered_cars_${DATE}.csv"

            python - "$DATE" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone

          date = sys.argv[1]
          with open("site/data/latest.json", encoding="utf-8") as f:
              latest = json.load(f)
          with open("site/data/filtered.json", encoding="utf-8") as f:
              filtered = json.load(f)

          manifest = {
              "date": date,
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "rowCount": len(latest),
              "filteredRowCount": len(filtered),
              "files": {
                  "latestJson": "data/latest.json",
                  "filteredJson": "data/filtered.json",
                  "latestCsv": f"data/merged_{date}.csv",
                  "filteredCsv": f"data/filtered_cars_{date}.csv",
              },
          }
          with open("site/data/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          PY

            FOUND_DATA=true
            echo "使用 $TAG 发布网页数据：$ROWS 行"
            break
          done

          if [ "$FOUND_DATA" != "true" ]; then
            echo "未找到可用 Release 数据，仅发布网页外壳"
          fi

          touch site/.nojekyll

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
