name: 部署车型配置网页

on:
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - config/filter_conditions.json
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:
    inputs:
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
      trigger_time:
        description: '触发时间戳'
        required: false
        default: ''
      release_tag:
        description: '精确部署的 Release tag；留空时保持自动选择兼容行为'
        required: false
        default: ''
      debug_mode:
        description: '部署前执行 debug 防缩小校验'
        required: false
        default: 'false'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置 Python
        uses: actions/setup-python@main
        with:
          python-version: "3.12"

      - name: 准备静态站点
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
        run: |
          set -euo pipefail
          rm -rf site release-files
          mkdir -p site/data site/config
          cp -R docs/. site/
          cp config/filter_conditions.json site/config/filter_conditions.json

          FOUND_DATA=false
          if [ -n "$RELEASE_TAG" ]; then
            TAGS=("$RELEASE_TAG")
          else
            mapfile -t TAGS < <(gh release list --repo "${{ github.repository }}" --limit 30 --json tagName --jq '.[].tagName')
          fi

          for TAG in "${TAGS[@]}"; do
            rm -rf release-files
            mkdir -p release-files
            if ! gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --dir release-files \
              --pattern 'merged_*.json' \
              --pattern 'filtered_cars_*.json' \
              --pattern 'merged_*.csv' \
              --pattern 'filtered_cars_*.csv'; then
              if [ -n "$RELEASE_TAG" ]; then
                echo "指定 Release $TAG 下载失败"
                exit 1
              fi
              continue
            fi

            mapfile -t MERGED_JSON_FILES < <(find release-files -maxdepth 1 -type f -name 'merged_*.json' -print)
            mapfile -t FILTERED_JSON_FILES < <(find release-files -maxdepth 1 -type f -name 'filtered_cars_*.json' -print)
            mapfile -t MERGED_CSV_FILES < <(find release-files -maxdepth 1 -type f -name 'merged_*.csv' -print)
            mapfile -t FILTERED_CSV_FILES < <(find release-files -maxdepth 1 -type f -name 'filtered_cars_*.csv' -print)
            if [ "${#MERGED_JSON_FILES[@]}" -ne 1 ] || [ "${#FILTERED_JSON_FILES[@]}" -ne 1 ] || \
               [ "${#MERGED_CSV_FILES[@]}" -ne 1 ] || [ "${#FILTERED_CSV_FILES[@]}" -ne 1 ]; then
              if [ -n "$RELEASE_TAG" ]; then
                echo "指定 Release $TAG 的数据资产不完整或不唯一"
                exit 1
              fi
              continue
            fi
            MERGED_JSON="${MERGED_JSON_FILES[0]}"

            ROWS=$(python - "$MERGED_JSON" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              print(len(json.load(f)))
          PY
          )

            if [ "$ROWS" -lt 50 ]; then
              echo "警告：$TAG 的 merged 数据只有 $ROWS 行"
            fi

            if [ "$DEBUG_MODE" = "true" ]; then
              if [ -z "$RELEASE_TAG" ]; then
                echo "debug 部署必须提供 release_tag"
                exit 1
              fi
              curl --fail --show-error --silent --location --retry 2 --connect-timeout 15 --max-time 60 \
                https://cars.jiucai.eu.org/data/latest.json \
                --output /tmp/current-pages-latest.json
              python scripts/verify_publish_superset.py \
                --baseline /tmp/current-pages-latest.json \
                --candidate "$MERGED_JSON"
            fi

            DATE=$(basename "$MERGED_JSON" | sed -E 's/merged_([0-9]+)\.json/\1/')
            cp "$MERGED_JSON" site/data/latest.json
            cp "${FILTERED_JSON_FILES[0]}" site/data/filtered.json
            cp "${MERGED_CSV_FILES[0]}" "site/data/merged_${DATE}.csv"
            cp "${FILTERED_CSV_FILES[0]}" "site/data/filtered_cars_${DATE}.csv"

            python - "$DATE" <<'PY'
          import json
          import sys
          from datetime import datetime, timezone

          date = sys.argv[1]
          with open("site/data/latest.json", encoding="utf-8") as f:
              latest = json.load(f)
          with open("site/data/filtered.json", encoding="utf-8") as f:
              filtered = json.load(f)

          manifest = {
              "date": date,
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "rowCount": len(latest),
              "filteredRowCount": len(filtered),
              "files": {
                  "latestJson": "data/latest.json",
                  "filteredJson": "data/filtered.json",
                  "latestCsv": f"data/merged_{date}.csv",
                  "filteredCsv": f"data/filtered_cars_{date}.csv",
              },
          }
          with open("site/data/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          PY

            FOUND_DATA=true
            echo "使用 $TAG 发布网页数据：$ROWS 行"
            break
          done

          if [ "$FOUND_DATA" != "true" ]; then
            echo "未找到可用 Release 数据，仅发布网页外壳"
          fi

          touch site/.nojekyll

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
